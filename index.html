Through an analysis of the labour laws, past and present, I discuss the three factors that perpetuate informality and make labour protections unavailable. Firstly, narrow legal definition of who is considered as a 'worker' or 'employee'; secondly, workforce size based arbitrary thresholds that determine applicability of employer liabilities and labour protections; and thirdly, discretionary social security schemes that replace enforceable rights - all of which collectively produce informality as a legal status. I conclude with a call for fundamental reimagination of labour laws based on universal, enforceable workplace rights, while confining the scope of this article here to a critical examination of how informality is legally produced.

        `When does the exercise of patent rights become an antitrust violation? The apex court is now poised to answer a question that remains at the intersection of "innovation in a healthy competitive market" and "market regulation." Recently, in Competition Commission of India v. Swapan Dey & Another, the Supreme Court (SC) has stepped into a core jurisdictional conflict to determine whether the Competition Commission of India (CCI), the chief national antitrust regulator in India, can investigate anti-competitive actions arising from the application of patent rights. The SC has recently stayed some contentious portions of a National Company Law Appellate Tribunal (NCLAT) order, which shielded patent disputes from CCI scrutiny and reopened one of the consequential debates in Indian antitrust law jurisprudence.

        `It was April 1989. Hardly, one year into the profession, I was chamber less, without a senior and in a city which I had never ever lived, but for the last one year. I was with a direction but without a boat to embark on this journey. It is here that my good friend and law classmate, Mathew Vellapally came to my rescue. He assured me that he will persuade advocate C.V. Francis with whom he recently got acquainted to take me into his chamber. I had only heard of CV Francis as an accomplished civil lawyer from a very old clerk in the district courts.

        `DPDP Act comes to rescue to protect the new ―oil‖ of the modern era. Section 12 of the Act introduces right to erasure of the personal data. the provision stipulates deletion of data by a data fiduciary even if the consent to use and process has been granted earlier by the principal. This is an important provision of the act, envisioning the right to be forgotten. But the issue arises with the AI. The provision is perfect when addressing the old way of processing and storing data like databases, cloud information etc. but not machine learning. Deleting data from databases or deleting chat is like picking strawberries from the garden but removing the data from a neural network is like removing strawberries from a smoothie Achieving this level of erasure is technically fraught. Further, this also gives big AI companies a loophole where they can remove the dataset for training but not address the model itself. Due to these concerns of privacy, there is a new paradigm shift called as ―machine unlearning‖ but remain unviable practically.

        `Some limited pathways for credit generation may still exist despite this regulatory tension. To understand these pathways, it's important to know what "additionality" means in carbon markets.

Simply put: carbon credits should only reward actions that wouldn't have happened anyway. If a company was going to reduce emissions regardless, whether to comply with the law or because it made financial sense, then those reductions aren't "additional," and shouldn't earn carbon credits. Think of it like rewarding someone for doing homework they were already required to do. There's no extra environmental benefit, so there's no credit. Given this principle, projects that exceed minimum requirements can still demonstrate additionality. For instance, the rules require basic composting, but a municipality that installs an advanced bio-methanation system that also generates electricity or produces compressed natural gas is going beyond compliance- the extra technology and environmental benefit can qualify for credits. Similarly, if industrial units are required to use 6% RDF but voluntarily use 20%, that additional 14% demonstrates they're doing more than legally necessary. Barrier analysis offers another route, and this is where things get interesting. Sometimes an activity might be legally mandated, but municipalities simply can't afford to do it. The key question then becomes, would this project happen without carbon credit revenue? For example, a city might be legally required to process its wet waste, but building a bio-methanation plant costs 10 crore and the city doesn't have the budget. Without being able to sell carbon credits from the methane reduction, the project is financially impossible. In this case, even though waste processing is mandatory, the carbon revenue "overcomes a barrier" that would have prevented the project from happening. The distinction is subtle but critical - the activity may be mandated by law, but the carbon financing enables implementation that would not otherwise occur. Here the carbon credits aren't rewarding compliance but making this compliance financially possible. Voluntary carbon markets may apply different standards than the CC         `The legal profession trains us to measure our words carefully. Precision is discipline. Preparation is identity. For years, I believed that if I worked hard enough, understood the law thoroughly, and argued with clarity, that would be sufficient. Over time, I realised I was measuring something else too — my tone, my pauses, my reactions. There are days I replay not the submissions I made, but the ones I softened. The moment when a remark went uncorrected because responding might have appeared confrontational. The email rewritten to sound firm, but not "too firm." The courtroom interruption I allowed to pass because insisting would have shifted attention from the argument to my reaction.

        `In the above factual backdrop, the central issue arose before the NCLAT was 'whether a corporate debtor continues to enjoy immunity from insolvency proceedings on the basis of past NBFC registration even after cancellation of such registration? Dismissing the appeal, the NCLAT held that what matters is not whether the corporate debtor was an NBFC when the loan was disbursed, but whether it was an FSP on the date of filing of the application under Section 7. Once the RBI cancels the certificate of registration, the company loses the protection under Section 3(7) and becomes subject to insolvency proceedings. The exemption is not permanent. It lasts only as long as the regulatory approval continues.

'Civil procedure encompasses the rules and standards that courts follow when adjudicating civil lawsuits and disputes between private parties. The primary objective of civil procedure is to facilitate the just and efficient resolution of cases while minimizing costs and delays. Case management involves the active involvement of the court in supervising the progress of a case from the time of filing until the final judgment. Clerks are essential in this process as they manage the court calendar and ensure that all documents are filed within the prescribed timelines. The initial stage of a civil suit begins with the filing of a plaint which sets out the facts of the case and the relief sought by the plaintiff. Once the plaint is admitted the court issues summons to the defendant to appear and file a written statement in response. Proper service of summons is a critical administrative task that clerks must monitor to avoid procedural delays. During the discovery phase parties exchange relevant information and documents to clarify the issues in dispute. Pre-trial conferences are often held to explore the possibility of settlement through alternative dispute resolution methods such as mediation or arbitration. If a settlement is not reached the case proceeds to trial where evidence is presented and witnesses are examined. The judicial officers rely on accurate case files and organized records to make informed decisions throughout the trial. The use of technology in case management has improved the tracking of case status and automated several administrative functions. Electronic filing systems and digital case records reduce the reliance on physical paper and enhance the accessibility of information. Effective case management requires coordination between judges and the administrative staff to handle the increasing volume of litigation. Clerks help in identifying old cases that require priority attention and assist in the preparation of periodic reports for higher authorities. Strategic planning in the court system focuses on reducing the pendency of cases and improving the overall quality of justice. By streamlining procedures and adopting modern management techniques the judiciary can respond more effectively to the needs of the public. Public confidence in the legal system is directly linked to the speed and fairness with which civil disputes are resolved by the courts. Timely disposal of cases is essential for the rule of law. Proper management ensures that justice is never denied due to administrative failures or procedural errors. Clerks help in identifying old cases.' ,
'The digital transformation of the Indian judiciary is an ambitious initiative aimed at making the justice system more accessible and efficient. The e-Courts project has played a pivotal role in implementing modern technology in courtrooms across the country. One of the major achievements of this project is the creation of a national judicial data grid that provides real time information on case status and judgments. Virtual courts have been established to handle small cases such as traffic violations and petty offenses through online platforms. This reduces the physical burden on the courts and provides a convenient way for citizens to resolve minor legal issues. The clerks have had to adapt to these changes by learning new digital skills and managing electronic case files. Video conferencing facilities have enabled the recording of evidence and the hearing of arguments from remote locations which is particularly useful for vulnerable witnesses and high security prisoners. Electronic filing of cases allows lawyers and litigants to submit documents from their offices at any time of the day. This shift toward a paperless court system requires robust cybersecurity measures to protect sensitive legal data from unauthorized access. The use of artificial intelligence in the legal sector is also being explored to assist in case research and the management of volumes of documents. Digital displays in court premises provide updated information on case numbers and hearing schedules to the public. Clerks play a key role in updating these systems and ensuring that the information provided to the litigants is accurate. Training programs are regularly conducted for court staff to keep them updated on the latest software and hardware technologies. The digital divide remains a challenge that needs to be addressed to ensure that people in rural areas can also benefit from these advancements. Mobile applications have been developed to provide easy access to court services and notifications to the users. The transition to a digital environment has improved the transparency of court operations and made it easier to monitor the performance of individual courts. As technology continues to evolve the judiciary must remain committed to adopting innovations that enhance the delivery of justice. The collaboration between the legal profession and technology experts is essential for the long term success of the digital transformation in the courts. Digital literacy for all judicial staff is now a mandatory requirement for modern administration. Timely disposal of cases is essential for rule.' ,
'The registry is the administrative heart of the High Court and is responsible for the smooth functioning of all judicial and non-judicial activities. It serves as the primary interface between the court and the legal fraternity as well as the general public. The Registrar General heads the registry and oversees the work of several departments including the filing section and the judicial branch. Clerks in the registry are responsible for the scrutiny of new petitions and ensuring that they comply with the rules of the court. Any defects in the filing must be noted and communicated to the concerned parties for rectification within a specific time. Once a petition is found to be in order it is registered and assigned a unique case number for further processing. The maintenance of case files is a vital responsibility of the registry staff to prevent loss or damage to important legal documents. The clerks also assist in the preparation of daily cause lists which detail the cases scheduled for hearing before different benches. Accuracy in the cause list is essential to ensure that judges and lawyers are prepared for the days proceedings. The registry also handles the issuance of certified copies of judgments and orders to the parties on request. This involves a systematic process of verification and authentication by the authorized officials. The administration of human resources and the management of the courts budget are also handled by specific sections within the registry. Technological upgrades in the registry have led to the automation of many manual tasks and improved the speed of document processing. The implementation of digital signatures and electronic storage of records has enhanced the security and reliability of court data. Clerks must maintain a high level of confidentiality and integrity while handling sensitive information in the registry. Public relations and the handling of inquiries from litigants are also important aspects of registry work. Effective communication and coordination among different departments are necessary for the overall efficiency of the court administration. The registry plays a critical role in supporting the judges in their judicial duties by providing timely and accurate information. Continuous improvement in registry processes is essential to meet the growing demands of the legal system and to provide better services to the stakeholders. Professionalism and dedication of the registry staff contribute significantly to the reputation and effectiveness of the High Court. Impacts the overall speed of justice delivery.' ,
'The constitutional law is the body of law that defines the relationship between different entities within a state and the rights of individuals. The Constitution of India is the supreme law of the land and provides the framework for the functioning of the government and the judiciary. Fundamental rights are a core part of the constitution and protect the basic liberties of every citizen from infringement by the state. These rights include the right to equality and freedom of speech and the right to life and personal liberty. The judiciary acts as the guardian of the constitution and has the power of judicial review to strike down any law that violates fundamental rights. High Courts have the authority under Article 226 to issue writs for the enforcement of these rights and for other legal purposes. Clerks assist in the processing of writ petitions and ensure that all procedural requirements are met for their admission. Public interest litigation has emerged as a powerful tool for the protection of the rights of marginalized sections of society. The constitution also outlines the directive principles of state policy which guide the government in creating a just and equitable society. The balance between fundamental rights and the directive principles is a key aspect of constitutional interpretation by the courts. The independence of the judiciary is essential for maintaining the rule of law and protecting the democratic values of the nation. Constitutional amendments are made by the parliament to reflect the changing needs of society while maintaining the basic structure of the constitution. Clerks play a role in maintaining the records of constitutional cases and documenting the landmark judgments that shape the legal history of the country. Understanding the values of the constitution is essential for every legal professional and court staff. The protection of minority rights and the promotion of social justice are integral parts of the constitutional mandate. The courts regularly deal with complex legal questions involving the interpretation of constitutional provisions. Legal aid services are provided to ensure that even the poorest citizens can access the courts for the protection of their rights. The constitution remains a living document that evolves through judicial interpretations and legislative actions to meet the aspirations of the people. By upholding the principles of the constitution the judiciary ensures that the spirit of democracy and justice is preserved for future generations. All court officials must respect the constitution.' ,
'The Code of Civil Procedure is the primary legislation that governs the practice and procedure of civil courts in India. It provides a comprehensive framework for the adjudication of civil disputes and ensures that justice is administered in a fair and transparent manner. A civil suit begins with the presentation of a plaint, which outlines the grievances of the plaintiff and the relief sought from the court. Upon the filing of a suit, the court issues summons to the defendant to appear and answer the claim. Clerks are responsible for the meticulous verification of these documents and the timely issuance of notices to all parties involved. The defendant must then file a written statement within the prescribed period to present their defense. The court proceeds to frame issues based on the pleadings to determine the core points of contention. Evidence is recorded through examinations and cross-examinations of witnesses to establish the facts of the case. Throughout this process, court clerks maintain the daily board, manage the physical and digital case files, and ensure that every order passed by the judge is accurately recorded. Adjournments should be granted only for valid reasons to prevent the undue delay of justice. The final stage of a civil suit is the pronouncement of a judgment, followed by the preparation of a formal decree. Execution proceedings allow the successful party to realize the fruits of the litigation through court intervention. Intermediate steps like interlocutory applications and temporary injunctions are often used to protect the interests of parties during the pendency of the suit. Modern judicial administration emphasizes the use of technology to streamline case management and reduce the backlog of cases. Electronic filing systems and virtual hearings have transformed the way civil litigation is conducted in the High Court and subordinate courts. Legal staff must be proficient in navigating these digital platforms to support the efficient functioning of the judiciary. The principles of natural justice require that both parties be given a fair opportunity to be heard before any decision is made. Effective court administration is the backbone of a robust legal system that upholds the rule of law. By following the standardized procedures, the courts ensure consistency and predictability in legal outcomes for all citizens. Every clerk plays a vital role in this machinery of justice. The commitment to timely disposal of cases is essential for maintaining public trust in the judicial process today.' ,
'The Bharatiya Nagarik Suraksha Sanhita governs the procedure for investigation and trial of criminal offenses in the country. A criminal case typically commences with the registration of a First Information Report at a police station regarding a cognizable offense. The police then conduct a thorough investigation to collect evidence and record statements from witnesses who are familiar with the facts. After completing the investigation, the police file a final report or charge sheet before the Magistrate having jurisdiction. Clerks in the criminal department are responsible for the scrutiny of these charge sheets and the maintenance of the case diary. The court then takes cognizance of the offense and issues process to the accused person to ensure their presence. In warrant cases, the court proceeds to frame formal charges against the accused if there is sufficient ground for proceeding. The prosecution bears the heavy burden of proving the guilt of the accused beyond any reasonable doubt. Defense counsel is provided to the accused to ensure a fair trial as mandated by the constitution. The judge evaluates the testimony of witnesses and the forensic evidence presented during the trial. Court clerks play a vital role in marking exhibits, managing the custody of case property, and preparing the daily cause list. Bail is a crucial aspect of criminal law that balances the liberty of the individual with the interests of society. The court may grant anticipatory bail in cases where an individual apprehends arrest for a non bailable offense. After hearing arguments from both the prosecution and the defense, the court delivers its judgment of conviction or acquittal. If convicted, the court hears the accused on the question of sentence before passing the final order. Appeals can be filed in higher courts to challenge the findings of the trial court based on legal or factual errors. Modern courtrooms utilize digital recording of evidence to ensure accuracy and speed up the trial process. Legal assistants and clerks must be well versed in the latest amendments to the criminal laws to assist the judiciary effectively. Ensuring the protection of victims and witnesses is a primary objective of the modern criminal justice system. The rule of law requires that every individual is treated with dignity and fairness during the entire judicial process from arrest to final judgment. The administration of justice depends on the integrity of all court officials and timely completion of every legal formality.' ,
'The administration of civil justice in the District Courts and High Courts follows the structured framework of the Code of Civil Procedure. Every civil suit commences with the presentation of a formal plaint by the plaintiff, detailing the cause of action and the specific reliefs sought from the court. The court clerk is responsible for the initial scrutiny of the plaint to ensure that the proper court fees have been paid and all necessary documents are annexed. Once the suit is admitted, the court issues summons to the defendants to file their written statements within the prescribed period of limitation. If the defendant fails to appear despite service of summons, the court may proceed ex-parte against them. The discovery and inspection phase allows both parties to examine relevant documents to narrow down the areas of dispute. Issues are then framed by the judge, which serve as the foundation for the subsequent trial and evidence recording. Clerks play a vital role during this stage by maintaining the suit diary and ensuring that all interim applications are properly numbered and listed for hearing. The burden of proof in civil matters generally rests on the party who asserts a fact, following the principle of preponderance of probabilities. Witnesses are examined in chief, cross-examined by the opposing counsel, and may be re-examined to clarify specific points. Modern judicial reforms have introduced the compulsory use of alternative dispute resolution mechanisms like mediation and lok adalats to reduce the backlog of cases. Final arguments are heard after the completion of evidence, where advocates cite various precedents from the Supreme Court and High Courts. The judge then pronounces the judgment, which is followed by the preparation of a formal decree. A decree-holder must file an execution petition to realize the fruits of the litigation if the judgment debtor fails to comply voluntarily. Court staff must ensure that certified copies of orders are issued promptly to the parties involved. Legal clerks and assistants must maintain absolute integrity and confidentiality while handling sensitive judicial records and electronic databases. The transition to e-filing and virtual hearings has significantly changed the traditional landscape of court management. Efficient record-keeping and timely disposal of interlocutory applications are essential for the smooth functioning of the judiciary. The ultimate goal of the civil justice system is to provide an effective, accessible, impartial forum for the peaceful resolution of private disputes and to uphold democratic values.' ,
'The Constitution of India is the supreme law of the land, providing a comprehensive framework for the governance of the nation and the protection of individual liberties. Adopted by the Constituent Assembly on November 26, 1949, it came into force on January 26, 1950, marking the transition of India into a sovereign, socialist, secular, and democratic republic. At its core, the Constitution serves as a social contract between the state and its citizens, establishing the rule of law and ensuring that power is exercised in a just and transparent manner. One of the most significant features of the Indian Constitution is the inclusion of Fundamental Rights in Part three, which are enforceable by the courts. These rights, ranging from the right to equality and freedom to the right against exploitation, are essential for the personal development and dignity of every individual. Article 14 guarantees equality before the law and equal protection of the laws, ensuring that the state does not discriminate against any citizen on grounds of religion, race, caste, sex, or place of birth. Furthermore, Article 21, which protects the right to life and personal liberty, has been interpreted expansively by the judiciary to include the right to a clean environment, privacy, and a speedy trial. The High Courts, under Article 226, and the Supreme Court, under Article 32, possess the power to issue writs for the enforcement of these fundamental rights, acting as the guardians of the Constitution. Legal clerks must be proficient in indexing these constitutional petitions and managing the vast documentation involved in writ litigation. The Directive Principles of State Policy, although not enforceable by courts, provide a guiding light for the state to establish a just social order. The separation of powers between the legislature, executive, and judiciary ensures a system of checks and balances, preventing any single branch from becoming absolute. In the modern era, the judiciary continues to evolve through landmark judgments that strengthen the democratic fabric of the nation. For a court clerk, understanding these constitutional provisions is vital for the efficient handling of cases that involve the interpretation of law and the protection of civil liberties. Ultimate objective of the constitutional machinery is to secure justice, liberty, equality, and fraternity for all citizens while maintaining the integrity and unity of the Indian nation through a robust judicial administration and the proper legal process and to ensure inclusive growth for every citizen.' ,
'Family law in the Indian judicial system encompasses a diverse range of personal laws that govern marriage, divorce, maintenance, and the guardianship of minors. These proceedings are primarily conducted in specialized Family Courts established to promote conciliation and ensure a speedy settlement of disputes relating to matrimonial affairs. A matrimonial suit typically begins with the filing of a petition for the restitution of conjugal rights, judicial separation, or the dissolution of marriage by a decree of divorce. The court clerk must carefully verify the jurisdictional facts and ensure that the petition complies with the specific requirements of the relevant personal law, such as the Hindu Marriage Act or the Special Marriage Act. Upon the filing of a case, the court usually directs the parties to appear before a trained counselor or mediator to explore the possibility of an amicable settlement. If mediation fails, the respondent is required to file a detailed counter-affidavit addressing the allegations made by the petitioner. Clerks in the family court department are responsible for maintaining the confidentiality of records and managing the scheduling of chamber hearings to protect the privacy of the litigants. Maintenance pendente lite and litigation expenses may be awarded by the court during the pendency of the suit to provide financial support to the dependent spouse. The welfare of the child is the paramount consideration in cases involving the custody and access of minor children. Evidence in matrimonial matters is often sensitive, and the court may allow the recording of testimony through video conferencing to avoid unnecessary confrontation between the parties. In cases of mutual consent divorce, the parties must undergo a mandatory waiting period unless it is waived by the court under exceptional circumstances. The final judgments in family law matters must be drafted with great care, addressing issues of permanent alimony and the distribution of joint property. The execution of maintenance orders is a critical aspect of the judicial process to ensure that the beneficiaries receive timely financial assistance. Legal assistants must be well-versed in the latest judicial precedents regarding the rights of women and children in domestic proceedings. The ultimate goal of the family court system is to provide a humane and sensitive environment for the resolution of domestic conflicts while upholding the legal rights of every family member and ensuring that social justice is served for all parties through the diligent application of law and compassion for everyone	involved.' ,
'The rapid advancement of digital technology has necessitated the evolution of robust cyber laws to regulate the virtual space and protect citizens from emerging online threats. In the contemporary judicial landscape, the Information Technology Act serves as the primary legislation governing electronic commerce and the prevention of cybercrimes across the nation. This legal framework provides formal recognition to electronic records and digital signatures, placing them on par with traditional physical documents in the eyes of the law. As the judiciary transitions towards paperless courts, the role of court clerks in managing electronic evidence and digital case files has become increasingly critical for modern administration. In Cybercrimes, ranging from unauthorized data access and identity theft to financial fraud and online harassment, present unique challenges to traditional investigative techniques and legal procedures. The prosecution must often rely on complex forensic reports and metadata to establish the link between a digital trail and the accused individual during trials. Section 65B of the Indian Evidence Act remains a cornerstone for the admissibility of electronic records, requiring a specific certificate to ensure the integrity of digital data. The Court officials and legal assistants must be well-versed in these technical requirements to avoid procedural lapses that could jeopardize the outcome of a case. Furthermore, the protection of personal data and privacy has emerged as a significant constitutional concern, leading to the development of more stringent data protection regulations. The judiciary frequently adjudicates disputes involving social media intermediaries and their liability for user-generated content under the established safe harbor provisions. Legal clerks play a vital role in indexing these complex digital exhibits and ensuring that the electronic repository of the court is maintained with the highest levels of security. As artificial intelligence and automated systems begin to influence various sectors, the legal system must proactively adapt to address the ethical and legal implications of these new technologies. Continuous training for judicial staff on the latest technological trends is essential for the effective delivery of justice in the digital age. The ultimate objective of modern cyber jurisprudence is to foster a secure, transparent, and accountable digital environment while upholding the fundamental rights and liberties of all individuals in the vast cyberspace and ensuring that the rule of law prevails in the virtual world for every single citizen by maintaining absolute digital integrity, full transparency, and total judicial excellence always for the greater public good	across	our	great	nation.' ,
'The protection of the natural environment has emerged as a significant area of legal practice within the Indian judicial system over the last few decades. The Constitution of India, through Article 48A and Article 51A, imposes a dual responsibility on both the state and the citizens to protect and improve the environment. The judiciary has played a pioneering role in developing environmental jurisprudence by interpreting the right to life under Article 21 to include the right to a clean and healthy atmosphere. Specialized bodies like the National Green Tribunal have been established to provide a dedicated forum for the speedy disposal of cases involving environmental issues and forest conservation. A legal clerk working in this department must be familiar with diverse statutes such as the Water Act, the Air Act, and the Environment Protection Act, Public Interest Litigation has been a powerful tool for environmental activists to bring issues of industrial pollution and illegal mining before the higher courts. The courts frequently apply international legal principles such as the polluter pays principle and the precautionary principle to ensure that development does not come at the cost of ecological destruction. Judicial officers often appoint expert committees to assess the environmental impact of large scale infrastructure projects before granting necessary clearances. Clerks are responsible for organizing these technical reports and ensuring that all stakeholders are served with the relevant judicial orders in a timely manner. Sustainable development remains the core objective, balancing the economic needs of the growing population with the urgent necessity of preserving natural resources for future generations. The doctrine of public trust suggests that the state is the trustee of all natural resources, which are meant for public use and enjoyment. Recent judgments have also focused on the conservation of wildlife and the protection of biodiversity from the threats of climate change and habitat loss. The effective enforcement of environmental laws requires constant monitoring by the local authorities and proactive participation by the civil society. Legal assistants must track the compliance reports filed by various government agencies to ensure that the directions of the court are implemented on the ground. The ultimate goal of environmental litigation is to foster a harmonious relationship between humanity and nature while ensuring that the ecological balance is maintained for the overall well-being of the planet and the prosperity of our entire nation and for every individual living here	today	and	in the	future.' ,
'The banking sector in India is regulated by a comprehensive set of laws designed to ensure financial stability and protect the interests of depositors across the nation. The Banking Regulation Act remains the primary legislation that empowers the Reserve Bank of India to oversee the operations of various commercial and cooperative banks. In recent years, the judicial system has seen a significant increase in litigation related to debt recovery and the management of non-performing assets. Specialized tribunals like the Debt Recovery Tribunal have been established to facilitate the speedy recovery of dues from defaulting borrowers and large corporate entities. A court clerk in this department must be meticulous in checking the verification of loan documents, mortgage deeds, and the statements of accounts annexed with the original application. The Securitisation and Reconstruction of Financial Assets and Enforcement of Security Interest Act allows banks to take possession of secured assets without the direct intervention of the court under specific conditions. However, the borrowers retain the right to challenge such actions before the tribunal to ensure that the process followed by the bank is legally sound. Clerks are responsible for maintaining the record of these high-value transactions and ensuring that all statutory notices are served within the prescribed timelines. The Insolvency and Bankruptcy Code has further revolutionized the financial legal landscape by providing a time-bound process for the resolution of corporate insolvency. Legal assistants must be well-versed in the latest circulars issued by the central bank regarding the classification of assets and the restructuring of loans. Furthermore, the Negotiable Instruments Act governs the legal proceedings related to the dishonor of checks, which constitutes a large portion of the pendency in the lower courts. Electronic fund transfers and digital banking have introduced new complexities in financial litigation, requiring the court staff to manage digital evidence and electronic trail logs effectively. The integrity of the financial system depends on the timely adjudication of these disputes to maintain investor confidence and ensure the steady flow of credit in the economy. The ultimate objective of banking jurisprudence is to balance the rights of the creditors with the legal protections available to the borrowers while maintaining a robust and transparent financial environment for the prosperity of the entire nation and for every single citizen residing in India today by providing complete justice to all stakeholders involved in the process while strictly adhering to the fundamental  principles of equity.' ,
'The framework of labor laws in India is designed to protect the rights of workers while ensuring the smooth operation of industrial establishments across the nation. Industrial jurisprudence has evolved significantly to balance the bargaining power between employers and employees through various legislative measures. The Industrial Disputes Act remains the cornerstone for the settlement of collective disputes and individual grievances related to retrenchment, layoffs, and wrongful termination. In labor courts and industrial tribunals are the primary forums where workers seek redressal for the violation of their statutory rights and service conditions. A court clerk in the labor department is responsible for the systematic filing of statements of claim and ensuring that the management submits its written statement within the prescribed timeframe. The verification of muster rolls, wage registers, and employment contracts is a vital task during the recording of evidence in labor matters. Furthermore, the Payment of Wages Act and the Minimum Wages Act ensure that workers receive their rightful compensation without unauthorized deductions. The clerks must be diligent in managing the records of industrial awards and ensuring that the directions for reinstatement or back wages are executed promptly. The emergence of the new Labor Codes seeks to consolidate and simplify various labor statutes into a more cohesive and modern legal framework. Legal assistants must stay updated with these legislative changes to assist the judiciary in interpreting the evolving standards of social security and occupational safety. Disputes regarding the registration of trade unions and the recognition of collective bargaining agents also form a significant part of industrial litigation. In the era of globalization, the courts frequently address issues related to contract labor and the rights of gig workers in the digital economy. The judiciary emphasizes in the principle of natural justice, ensuring that no worker is punished without a fair departmental inquiry and a proper opportunity to be heard. Effective adjudication of labor disputes is essential for maintaining industrial peace and fostering economic growth within the country. The ultimate goal of labor jurisprudence is to promote social justice and ensure that every worker is treated with dignity and fairness in their workplace. This objective is achieved by strictly upholding the constitutional mandates and protecting the fundamental rights of the labor force while ensuring that industrial productivity is maintained for the overall welfare of the entire society and for the continuous progress of our great nation and all of	its	people.' ,
'The regulation of property rights in India is governed by the Transfer of Property Act and the Registration Act, which provide the legal framework for the sale, mortgage, lease, and exchange of immovable assets. Property litigation constitutes a substantial portion of the civil caseload in our courts, often involving complex disputes over title, possession, and inheritance. Every property transaction must be recorded through a registered deed to ensure its validity and to provide public notice of the transfer of ownership. A court clerk in the civil department plays a crucial role in verifying the original title deeds, revenue records, and encumbrance certificates submitted during the trial. The introduction of the Real Estate Regulation and Development Act has further strengthened the rights of home buyers by ensuring transparency and accountability in the housing sector. Specialized authorities under this Act provide a speedy redressal mechanism for grievances related to delayed possession or structural defects in residential projects. In property suits, the court often appoints a court commissioner to conduct a local investigation and submit a report on the physical status of the land. Clerks are responsible for processing the commission warrants and ensuring that the maps and field books are properly exhibited in the judicial record. The law of adverse possession remains a significant aspect of property jurisprudence, where long and continuous possession might lead to the acquisition of ownership rights. Furthermore, the principles of ancestral property and succession under personal laws often lead to intricate partition suits among legal heirs. Legal assistants must be proficient in tracking the genealogy of the parties and the historical mutations in the revenue registers. Equitable remedies like permanent injunctions are frequently sought to prevent the unauthorized alienation or encroachment of disputed lands. The digital transformation of land records across various states has significantly helped in reducing the scope for fraudulent transactions and forged documents. Efficient management of property records by the court staff is essential for the timely delivery of judgments in these long-standing disputes. The ultimate goal of property law is to ensure a secure and stable environment for the enjoyment of individual assets while upholding the principles of social justice. Achieved by maintaining accurate judicial records and ensuring that the legal rights of every citizen are protected against any unlawful interference or arbitrary deprivation through the diligent application of the established laws and procedures for the overall benefit of the public at large.' ,
'The Juvenile Justice Care and Protection of Children Act serves as the primary legal framework for the rehabilitation and social reintegration of children in conflict with the law and those in need of care and protection. This legislation is based on the fundamental principle that children should be treated differently from adults, focusing on reformative justice rather than punitive measures. Juvenile Justice Boards and Child Welfare Committees are specialized bodies established to handle these cases with extreme sensitivity and care. A court clerk in this department is responsible for ensuring that all proceedings are conducted in an environment that is not intimidating to the child. The maintenance of confidential records is strictly mandated to protect the identity and future prospects of the minor involved in any legal process. The clerks must be diligent in tracking the individual care plans and periodic progress reports submitted by probation officers and child care institutions. In cases where a child above the age of sixteen is alleged to have committed a heinous offense, the Board conducts a preliminary assessment to determine if they should be tried as an adult. However, the primary goal remains the holistic development of the child and their ultimate return to a stable family environment. The legal assistants must be well-versed in the international standards and domestic rules regarding the institutionalization of children as a measure of last resort. Furthermore, the Protection of Children from Sexual Offences Act provides a robust legal mechanism to address crimes against minors while ensuring a child-friendly trial process. The recording of evidence in such cases is often done through the use of curtains or video links to prevent the child from seeing the accused person. The court staff must coordinate with specialized support persons and counselors to provide a safe atmosphere during the testimony. The ultimate objective of the juvenile justice system is to uphold the best interests of the child as the paramount consideration in every judicial decision. This is achieved by providing access to education, vocational training, and psychological support to every child within the legal system to ensure they become productive citizens of our great nation and contribute positively to our diverse society while their rights are fully protected at every single stage of the trial and for their entire future life in the country through a comprehensive and highly effective framework of protection designed for the welfare of all youth.'


    ];

    // Keep word count around 400–450
    function enforceWordCount(passage, minWords = 400, maxWords = 500) {
        let words = passage.trim().split(/\s+/);
        if (words.length >= minWords && words.length <= maxWords) return words.join(' ');
        while (words.length < minWords) words.push('justice');
        if (words.length > maxWords) words = words.slice(0, maxWords);
        return words.join(' ');
    }
    const correctedPassages = passages.map(p => enforceWordCount(p, 400, 500));

    // DOM elements
    const setupPanel = document.getElementById('setupPanel');
    const testPanel = document.getElementById('testPanel');
    const resultPanel = document.getElementById('resultPanel');
    const passageSelect = document.getElementById('passageSelect');
    const showSourceCheck = document.getElementById('showSourceCheck');
    const disableBackspaceCheck = document.getElementById('disableBackspaceCheck');
    const startBtn = document.getElementById('startBtn');
    const timerDisplay = document.getElementById('timerDisplay');
    const sourceTextDiv = document.getElementById('sourceText');
    const sourceColumn = document.getElementById('sourceColumn');
    const typedArea = document.getElementById('typedArea');
    const submitTestBtn = document.getElementById('submitTestBtn');
    const statsGrid = document.getElementById('statsGrid');
    const highlightedPassage = document.getElementById('highlightedPassage');
    const retryBtn = document.getElementById('retryBtn');

    let currentPassageText = '', sourceWords = [], selectedPassageIndex = 0;
    let timerInterval = null, timeLeft = 600, startTime = null;
    let showSource = true, disableBackspace = false, testActive = false;

    function formatTime(s) {
        const m = Math.floor(s / 60), sec = s % 60;
        return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
    }
    function clearTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
    }
    function getSelectedIndex() {
        const val = passageSelect.value;
        return val === 'random' ? Math.floor(Math.random() * correctedPassages.length) : parseInt(val, 10);
    }
    function updateSelectedIndex() { selectedPassageIndex = getSelectedIndex(); }
    function resetView() {
        clearTimer();
        setupPanel.classList.remove('hidden');
        testPanel.style.display = 'none';
        resultPanel.style.display = 'none';
        testActive = false;
        timeLeft = 600;
        timerDisplay.textContent = formatTime(timeLeft);
        typedArea.value = '';
        sourceTextDiv.innerHTML = '';
        showSource = showSourceCheck.checked;
        disableBackspace = disableBackspaceCheck.checked;
        sourceColumn.style.display = '';
        sourceTextDiv.classList.remove('hidden');
        updateSelectedIndex();
    }

    function startTest() {
        updateSelectedIndex();
        currentPassageText = correctedPassages[selectedPassageIndex];
        sourceWords = currentPassageText.trim().split(/\s+/);
        showSource = showSourceCheck.checked;
        disableBackspace = disableBackspaceCheck.checked;
        // Render with paragraphs
        const lines = currentPassageText.split('\n');
        sourceTextDiv.innerHTML = lines.map(line => escapeHTML(line)).join('<br>');
        if (showSource) {
            sourceColumn.style.display = '';
            sourceTextDiv.classList.remove('hidden');
        } else {
            sourceColumn.style.display = 'none';
            sourceTextDiv.classList.add('hidden');
        }
        typedArea.value = '';
        typedArea.disabled = false;
        typedArea.focus();
        timeLeft = 600;
        timerDisplay.textContent = formatTime(timeLeft);
        startTime = Date.now();
        clearTimer();
        timerInterval = setInterval(() => {
            timeLeft--;
            timerDisplay.textContent = formatTime(timeLeft);
            if (timeLeft <= 0) { clearTimer(); submitTest(); }
        }, 1000);
        setupPanel.classList.add('hidden');
        testPanel.style.display = 'flex';
        resultPanel.style.display = 'none';
        testActive = true;
    }

    typedArea.addEventListener('keydown', function(e) {
        if (!testActive) return;
        if (disableBackspace && e.key === 'Backspace') e.preventDefault();
    });

    function submitTest() {
        if (!testActive) return;
        clearTimer();
        testActive = false;
        typedArea.disabled = true;
        const typedRaw = typedArea.value;
        const userWords = typedRaw.trim().split(/\s+/).filter(w => w.length > 0);
        const totalSource = sourceWords.length;
        const typedCount = userWords.length;
        // LCS
        const n = totalSource, m = typedCount;
        const dp = Array.from({length: n+1}, () => new Array(m+1).fill(0));
        for (let i=1; i<=n; i++) {
            for (let j=1; j<=m; j++) {
                if (sourceWords[i-1].toLowerCase() === userWords[j-1].toLowerCase())
                    dp[i][j] = dp[i-1][j-1] + 1;
                else
                    dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
            }
        }
        const lcsLength = dp[n][m];
        const wrongWords = typedCount - lcsLength;
        // Remaining includes both untyped source words AND wrong typed words
        const remainingWords = totalSource - lcsLength;  // untyped + wrong
        const elapsedMs = Date.now() - startTime;
        const elapsedMin = elapsedMs / 60000;
        const wpm = elapsedMin > 0 ? Math.round(lcsLength / elapsedMin) : 0;
        const accuracy = typedCount === 0 ? 0 : ((lcsLength / typedCount) * 100).toFixed(2);
        const penalty = (wrongWords + remainingWords) * 0.25;
        const marks = (20 - penalty).toFixed(2);
        const passFail = parseFloat(marks) >= 10 ? '✅ Pass' : '❌ Fail';

        const statsData = [
            { label: 'Total Words', value: totalSource },
            { label: 'Typed Words', value: typedCount },
            { label: 'Wrong Words', value: wrongWords },
            { label: 'Remaining', value: remainingWords },
            { label: 'Speed (WPM)', value: wpm },
            { label: 'Accuracy %', value: `${accuracy}%` },
            { label: 'Marks', value: `${marks} / 20` },
            { label: 'Result', value: passFail }
        ];
        statsGrid.innerHTML = statsData.map(s => `
            <div class="stat-card">
                <div class="stat-value">${s.value}</div>
                <div class="stat-label">${s.label}</div>
            </div>
        `).join('');

        // Highlight
        let i = n, j = m;
        const matchFlags = new Array(m).fill(false);
        while (i > 0 && j > 0) {
            if (sourceWords[i-1].toLowerCase() === userWords[j-1].toLowerCase()) {
                matchFlags[j-1] = true; i--; j--;
            } else if (dp[i-1][j] >= dp[i][j-1]) i--;
            else j--;
        }
        let hl = '';
        for (let idx = 0; idx < userWords.length; idx++) {
            const word = userWords[idx];
            const cls = matchFlags[idx] ? 'word-correct' : 'word-wrong';
            hl += `<span class="${cls}">${escapeHTML(word)}</span> `;
        }
        highlightedPassage.innerHTML = hl.trim();
        testPanel.style.display = 'none';
        resultPanel.style.display = 'flex';
    }

    function escapeHTML(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    passageSelect.addEventListener('change', updateSelectedIndex);
    startBtn.addEventListener('click', startTest);
    submitTestBtn.addEventListener('click', submitTest);
    retryBtn.addEventListener('click', resetView);
    updateSelectedIndex();
    resetView();
})();
</script>
</body>
