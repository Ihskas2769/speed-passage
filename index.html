    <style>
        * {

        }

        body {

        .test-panel {

            font-variant-numeric: tabular-nums;

            letter-spacing: 0.5px;
        }

            background: #f9fafb;
            border: 1px solid #dee2e6;
            border-radius: 18px;
            padding: 20px;
            font-size: 1rem;

        .result-panel {
            display: none;

        .stats-grid {

            gap: 16px;

        .stat-card {
            background: #f8fafc;

            text-align: center;

        }
        .stat-value {
            font-size: 1.9rem;
            font-weight: 700;

            border: 1px solid #e9eef3;
            border-radius: 18px;
            padding: 20px;

            line-height: 1.9;
            word-break: break-word;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;

        .word-correct {
            color: #166534;
            font-weight: 500;
            background: #dcfce7;
            padding: 2px 8px;
            border-radius: 8px;
            display: inline-block;
        }
        .word-wrong {
            color: #b91c1c;
            font-weight: 600;
            background: #fee2e2;
            padding: 2px 8px;
            border-radius: 8px;
            display: inline-block;
            text-decoration: underline wavy #b91c1c;

        }

        @media (max-width: 750px) {
            .columns {
                flex-direction: column;
            }

<body>
    <div class="app-container">
        <div class="header">

        <!-- Setup Panel -->
        <div id="setupPanel" class="setup-panel">

                    <option value="random">🎲 Random Passage</option>

            <div class="options-row">

            <button id="startBtn" class="btn">▶ Start Typing Test</button>
            <a id="speedPracticeSetup" class="btn btn-speed" href="high court passages.pdf" target="_blank">⚡ Speed Practice</a>
            <p style="color:#64748b; font-size:0.9rem;">⏳ 10 minutes • English • Space moves to next word</p>
        </div>

        <!-- Test Panel -->
        <div id="testPanel" class="test-panel">
            <div class="top-bar">
                <div class="timer" id="timerDisplay">10:00</div>
                <div></div>
            </div>
            <div class="columns">
                <div class="source-col" id="sourceColumn">
                    <div class="column-title">📜 Source Passage</div>

                </div>
                <div class="typed-col">
                    <div class="column-title">✍ Your Typed Passage</div>
                    <textarea id="typedArea" class="typed-area" placeholder="Start typing the passage here... Press space to move to next word." spellcheck="false"></textarea>
                </div>
            </div>
            <button id="submitTestBtn" class="btn btn-submit">✅ Submit Test</button>
        </div>

        <!-- Result Panel -->

            <div class="stats-grid" id="statsGrid"></div>

                <h3 style="margin-bottom:12px; color:#334155;">🔍 Your Typed Passage</h3>
                <div id="highlightedPassage" class="highlight-passage"></div>
            </div>
            <div style="display: flex; gap: 16px; flex-wrap: wrap;">
                <button id="retryBtn" class="btn">🔄 Practice Again</button>
                <a id="speedPracticeResult" class="btn btn-speed" href="speed.html" target="_blank">⚡ Speed Practice</a>
            </div>

    <script>
        (function() {
            // ⚡ SET YOUR SPEED PRACTICE PAGE URL HERE
            const SPEED_PRACTICE_URL = './speed.html'; // 👈 Replace with your actual link

            // Apply URL to both buttons
            document.getElementById('speedPracticeSetup').href = SPEED_PRACTICE_URL;
            document.getElementById('speedPracticeResult').href = SPEED_PRACTICE_URL;

            // ------------------ PASSAGES (400–450 words) ------------------
            const passages = [
                'The petitioner is an accused for offences punishable under Sections 302 and 201 of the IPC. He was convicted for the said offences and was taken into custody on 11.07.2009 and is in custody from the said date even today. A criminal appeal filed by the petitioner before this Court is also dismissed on. The claim of the petitioner in the subject petition is that the petitioner though not completed 14 years as is required in law for a premature release, is before this Court seeking consideration of his premature release on account of his exemplary conduct in the prison and acquisition of several educational qualifications while in prison. The qualification that the petitioner has acquired while in prison are as follows: The petitioner has acquired Post Graduate Certificate Training in Cyber Law from National Open University, a certificate to that effect is also issued to the petitioner. The petitioner has further acquired Post Graduation Diploma in Criminal justice again by the National Open University, a certificate to that effect is also appended to the petition. Apart from the qualifications that he has acquired while he is in prison, there are several certificates of appreciation by the Superintendent of Prison appended to the petition. These are all matters of record and are not in dispute. The imprisonment certificate of the petitioner would demonstrate that the petitioner has completed close to 13 years 2 months as on date in prison and according to the learned AGA, he has to wait for another 10 months for completion of 14 years for him to seek any premature release. Learned counsel appearing for the petitioner would seek to place reliance upon plethora of judgments rendered by the Apex Court, where the detenu has been released much before the completion of 14 years or much before completion of the term owing to the qualifications that they have possessed during their imprisonment and for the exemplary conduct that they have maintained while in prison as per the certificates issued by the respective superintendents of such prison. The detenu in this case is about 46 years of age now and we are informed that during the period of incarceration in jail, he has completed the following educational We find that the detenu in this case was convicted in another case under Section 120 of the Indian Penal Code, 1860 and sentenced to imprisonment for 5 years and was convicted under Section 4 of the Explosives Substances Act.',
                'The administration of justice within the sovereign framework of India necessitates a robust and transparent judicial hierarchy, wherein the High Courts occupy a pivotal position of constitutional significance. The Bombay High Court, being one of the oldest and most prestigious institutions in the country, serves as a beacon of legal excellence and integrity. Its jurisdiction extends over the states of Maharashtra and Goa, as well as the Union Territories of Dadra and Nagar Haveli and Daman and Diu. To maintain the efficiency of such a vast judicial machinery, the role of the clerical staff is indispensable. A High Court Clerk is entrusted with the meticulous management of case files, the accurate recording of testimonies, and the systematic filing of affidavits. These responsibilities require not only a profound understanding of procedural law but also an exceptional degree of clerical precision and technical proficiency. In the contemporary legal landscape, the integration of digital technology has transformed the traditional methods of court management. The transition from physical documentation to electronic filing systems aims to reduce the pendency of cases and ensure the swift delivery of justice to the common citizen. However, this evolution demands that the staff possess superior typing speed and clerical accuracy. A single typographical error in a court order or a decree can lead to significant legal complications, potentially altering the outcome of a case or causing unnecessary delays in the execution of justice. Therefore, the recruitment process for clerks emphasizes rigorous testing of linguistic ability and technical skill. Candidates are expected to demonstrate their competence in handling complex legal terminology while maintaining a consistent speed over a sustained period. Furthermore, the principles of natural justice require that every legal proceeding be conducted with utmost transparency. The records maintained by the Registry serve as the official history of the litigation process. Whether it involves civil disputes regarding land partitions, criminal appeals, or writ petitions involving fundamental rights, the clerical record remains the primary source of reference for the Honerable Judges and the legal fraternity. As the judiciary continues to deal with an increasing influx of litigations, the demand for dedicated, skilled, and honest personnel remains at an all-time high. Aspiring candidates must recognize that their contribution, though often behind the scenes, is fundamental to the preservation of the rule of law and the maintenance of public trust in the judicial system of our nation.' ,
                'The Maharashtra Rent Control Act of 1999 stands as a vital piece of legislation designed to unify and amend the laws relating to the control of rent and repairs of certain premises in the State of Maharashtra. This Act replaced the erstwhile Bombay Rents, Hotel and Lodging House Rates Control Act of 1947, bringing about a more balanced approach between the rights of landlords and the protections afforded to tenants. In the jurisdiction of the Bombay High Court, a significant volume of litigation arises from disputes concerning the possession of premises, the fixation of standard rent, and the recovery of arrears. For a Court Clerk, understanding the nuances of such statutes is essential, as the processing of suits filed under these provisions requires strict adherence to the timelines prescribed by the Code of Civil Procedure. Every civil suit initiated in the District Courts or the Small Causes Court eventually forms the basis of appellate or revisional proceedings before the High Court. The Registry must ensure that the "Paper Book," which contains all relevant pleadings, exhibits, and testimonies, is prepared with absolute fidelity to the original record. During the typing of a judgment or an interlocutory order, the clerk must be vigilant regarding the spelling of legal maxims and the correct citation of previous precedents. For instance, references to Article 226 or Article 227 of the Constitution of India must be typed with precision, as these provisions vest the High Court with the power of judicial review and superintendence over all subordinate courts and tribunals within its territorial limits. Moreover, the efficiency of the judiciary is often measured by the speed at which it disposes of long-pending matters. The "Case Information System" currently employed by the Indian judiciary relies heavily on the data entry performed by the clerical staff. Accurate data entry ensures that litigants can track their case status online, thereby promoting transparency and reducing the need for physical inquiries at the filing counter. A clerk must possess the mental fortitude to handle repetitive tasks while maintaining a high level of concentration. The ability to type at a steady pace of forty words per minute, while simultaneously ensuring that there are no grammatical or factual discrepancies, is the hallmark of a competent judicial employee. By mastering these technical skills, candidates contribute directly to the dignity of the court and the seamless administration of the legal process in our democratic society.' ,
                'The exercise of Writ Jurisdiction by the High Court under Article 226 of the Constitution of India represents one of the most potent safeguards against the arbitrary exercise of power by the State or its instrumentalities. This extraordinary jurisdiction allows the Court to issue various directions, orders, or writs, including Habeas Corpus, Mandamus, Prohibition, Quo Warranto, and Certiorari, for the enforcement of fundamental rights and for any other purpose. In the day-to-day operations of the Bombay High Court, a substantial number of petitions are filed challenging the decisions of quasi-judicial bodies, local municipal authorities, and government departments. The clerical department plays a critical role in the initial scrutiny of these petitions. A clerk must verify whether the court fees have been properly paid under the Maharashtra Court Fees Act and ensure that all annexures are clearly legible and duly certified as true copies. Accuracy in the preparation of the "Daily Cause List" is another vital responsibility that demands high-speed typing and attention to detail. This list serves as the official schedule for the courts proceedings, and any error in the case number, the names of the advocates, or the specific bench assigned can cause significant logistical hurdles in the courtroom. Furthermore, when the Honble Judges dictate orders in open court, the ability of the staff to transcribe and type these directions swiftly is paramount. Legal language often involves archaic terms and Latin phrases such as "inter alia," "mutatis mutandis," and "ad interim," which must be reproduced without error. The transition toward a "Paperless Court" model further necessitates that clerks are proficient in handling digital signatures and uploading scanned documents into the centralized server system. Beyond technical skill, the position of a Court Clerk demands a high standard of ethical conduct and confidentiality. During the pendency of sensitive litigations, particularly those involving matrimonial disputes or intellectual property rights, the clerical staff must ensure that no unauthorized person gains access to the case records. The judicial process relies on the silent but significant contribution of these officers who manage the documentation that forms the backbone of every judgment. As candidates prepare for the typing test, they should focus on maintaining a rhythmic typing speed while keeping their posture ergonomic to avoid fatigue. Success in the recruitment process requires a combination of linguistic fluency, technical dexterity, and a commitment to serving the cause of justice with integrity and diligence in one of Indias most venerable legal institutions.' ,
                'The law of evidence is an essential branch of adjectival law that determines the path through which facts are proved within a court of law. Under the Indian Evidence Act, the distinction between "proved," "disproved," and "not proved" forms the bedrock of judicial reasoning. In criminal trials, the burden of proof traditionally rests upon the prosecution, which must establish the guilt of the accused beyond a reasonable doubt. For the clerical staff at the Bombay High Court, the processing of criminal appeals requires an intimate familiarity with the trial court records, including the "Roznama," the deposition of witnesses, and the various exhibits marked during the proceedings. Accuracy in transcribing these records is non-negotiable, as the appellate bench relies heavily on the written word to determine if the lower courts judgment warrants interference. A significant portion of the High Courts workload involves the scrutiny of "First Information Reports" and the subsequent "Charge Sheets" filed under Section 173 of the Code of Criminal Procedure. When a clerk is tasked with entering data related to these documents, they must ensure that the names of the parties, the sections of the Indian Penal Code, and the dates of the alleged offenses are recorded without a single discrepancy. For instance, a mistake in typing Section 302 instead of Section 307 can lead to a fundamental misunderstanding of the nature of the crime. Furthermore, the modern clerk must be adept at handling electronic evidence, such as call detail records or CCTV footage, which are now increasingly governed by the provisions of Section 65B of the Evidence Act. In addition to technical proficiency, a clerk must maintain the highest standards of decorum and discipline within the court premises. The Registry is often the first point of contact for advocates and litigants alike; therefore, clarity in communication and efficiency in the handling of inquiries are indispensable traits. The ability to maintain a typing speed of over forty words per minute is not merely a requirement for the entrance examination but a daily necessity in a high-pressure environment where urgent matters are moved for "Circulation" before the Honble Bench. As the judiciary moves toward a more streamlined and transparent era, the clerical staff remains the vital link between the legal practitioners and the final delivery of a judgment. Mastery of these skills ensures that the wheels of justice turn smoothly, upholding the constitutional mandate of providing a fair and speedy trial to every citizen.' ,
                'Public relations and media management have become increasingly important functions in government organizations. Courts and public offices must maintain positive relationships with the media and general public to ensure transparency and build trust. Clerks often serve as the first point of contact for media personnel and must understand the principles of effective communication and information dissemination. Proper media management helps maintain the dignity and credibility of judicial and administrative institutions. Media interaction requires careful preparation and adherence to established protocols. Only the authorized personnel should speak to media representatives on behalf of the organization. Clerks must be aware of what information can be shared publicly and what must remain confidential. Press releases and official statements should be prepared carefully and reviewed by senior officials before release. Maintaining professional relationships with media personnel helps ensure accurate reporting of organizational activities. Information disclosure policies govern what information can be made available to the public and media. The Right to Information Act has made government organizations more transparent and accountable. Clerks must understand the provisions of information disclosure laws and help citizens access public information. However, certain categories of information remain confidential and cannot be disclosed. Proper training helps clerks distinguish between information that can be shared and that which must be protected. Crisis communication management is essential when organizations face negative publicity or controversial situations. Clerks may be involved in preparing factual statements and coordinating with media during crisis situations. Quick and accurate response to media queries helps prevent misinformation and speculation. Maintaining calm and professional demeanor during crisis situations is crucial for effective communication. Regular training in crisis communication helps staff respond appropriately to challenging situations. Social media management has become an important aspect of public relations in the digital age. Many government organizations maintain official social media accounts to communicate with citizens. Clerks may be involved in preparing content for social media platforms and monitoring online discussions. Understanding social media etiquette and guidelines is essential for effective online communication. Regular monitoring of social media helps organizations respond to public concerns and feedback. Public outreach programs help organizations connect with citizens and stakeholders. Courts may organize awareness programs about legal procedures and citizen rights. Clerks assist in organizing such events and preparing informational materials. Community engagement activities help build positive relationships and improve public understanding of organizational functions. Feedback from public outreach programs provides valuable insights for improving services and communication.' ,
                'Emergency management and business continuity planning are critical functions that ensure organizations can continue operating during crisis situations. Natural disasters, technological failures, and other emergencies can disrupt normal operations and affect service delivery. Government offices and courts must have comprehensive emergency plans to protect personnel, preserve records, and maintain essential services. The clerks play important roles in implementing emergency procedures and ensuring business continuity during crisis situations. Risk assessment is the foundation of effective emergency planning. Organizations must identify potential threats including natural disasters, fire, power failures, cyber attacks, and security breaches. Clerks help assess the vulnerability of different systems and processes to various risks. Understanding the potential impact of different emergencies helps in developing appropriate response strategies. Regular risk assessments ensure that emergency plans remain current and comprehensive as circumstances change. Emergency response procedures are specify the actions to be taken when different types of emergencies occur. When Evacuation plans, communication protocols, and resource allocation procedures must be clearly documented and regularly practiced. Clerks must be familiar with their roles and responsibilities during emergency situations. Quick and coordinated response can minimize damage and ensure the safety of personnel and visitors. Regular drills and training exercises help staff respond. Data backup and recovery procedures are essential for protecting important records and information systems. Critical documents and electronic data must be backed up regularly and stored in secure locations. Clerks are often responsible for implementing backup procedures and ensuring that recovery systems are tested periodically. Cloud based backup solutions provide additional security and accessibility during emergencies. Proper data protection ensures that essential information remains available even if primary systems are damaged. Communication systems must remain operational during emergencies to coordinate response efforts and provide information to stakeholders. Alternative communication methods should be available if primary systems fail. Clerks help maintain emergency contact lists and communication equipment. Social media and public address systems may be used to communicate with the public during emergencies. Clear and timely communication helps reduce panic and ensures that accurate information is available to all concerned parties. Resource management during emergencies involves ensuring that essential supplies and equipment are available when needed. Emergency supplies including first aid kits, flashlights, and communication devices should be maintained and regularly checked. Clerks help inventory emergency supplies and coordinate with external agencies for additional resources when required. Proper resource planning ensures that response efforts are not hampered by lack of essential materials and equipment.' ,
                'Project management is a systematic approach to planning, executing, and completing specific tasks within defined timeframes and resource constraints. Government organizations undertake various projects including infrastructure development, system upgrades, and service improvement initiatives. Clerks often participate in project teams and must understand basic project management principles to contribute effectively. Successful project management requires coordination, communication, and careful monitoring of progress against established objectives. Project planning involves defining objectives, identifying tasks, estimating resources, and creating schedules. Clear project goals help team members understand what needs to be accomplished and how success will be measured. Work breakdown structures divide complex projects into manageable tasks that can be assigned to team members. Clerks assist in gathering requirements, documenting processes, and preparing project documentation. Realistic planning considers potential risks and includes contingency measures to address unforeseen challenges. Resource allocation ensures that necessary personnel, equipment, and materials are available when needed. Project managers must balance competing demands for limited resources and make optimal allocation decisions. Clerks help track resource utilization and identify potential shortages or conflicts. Effective resource management prevents delays and cost overruns while ensuring quality standards are maintained. Regular monitoring of resource consumption helps identify deviations from planned allocations. Communication management is crucial for project success as team members must coordinate their efforts and share information regularly. Project meetings, status reports, and documentation systems facilitate communication among stakeholders. Clerks often maintain project records, prepare meeting minutes, and distribute information to team members. Clear communication channels prevent misunderstandings and ensure that everyone has access to current project information. Regular updates keep stakeholders informed about progress and any issues that arise. Risk management involves identifying potential problems that could affect project success and developing strategies to mitigate them. Common project risks include technical difficulties, resource constraints, schedule delays, and scope changes. Clerks help monitor risk indicators and implement risk mitigation measures. Early identification and response to risks can prevent minor issues from becoming major problems. Risk registers document identified risks and track the effectiveness of mitigation strategies. The quality control ensures that project deliverables meet specified standards and requirements. Regular reviews and testing help identify defects or deviations from requirements. Clerks assist in quality assurance activities including document review, testing procedures, and compliance verification. Quality standards should be established at the beginning of projects and monitored throughout the implementation process. The maintaining quality standards prevents rework and ensures that project outcomes reviews and meet stakeholder expectations.' ,
                'Environmental sustainability has become a critical concern for organizations worldwide as they recognize their responsibility to protect natural resources and reduce environmental impact. Government offices and courts consume significant amounts of paper, energy, and other resources in their daily operations. The implementing sustainable practices not only protect the environment but also reduces operational costs and demonstrates social responsibility. Clerks play important roles in implementing and maintaining environmental sustainability initiatives in their workplaces. Paper consumption reduction is one of the most visible sustainability initiatives in office environments. Digital document management systems reduce the need for printing and physical storage of documents. Clerks can contribute by using electronic filing systems, sending emails instead of printed memos, and printing documents only when absolutely necessary. Double sided printing and using recycled paper further reduce environmental impact. Proper maintenance of printers and copiers ensures efficient operation and reduces waste. Energy conservation measures help reduce electricity consumption and carbon footprint. Simple actions like turning off lights and computers when not in use can result in significant energy savings. Clerks should be encouraged to use natural light whenever possible and adjust air conditioning settings to optimal levels. Energy efficient equipment and LED lighting systems reduce long term energy consumption. Regular maintenance of electrical equipment ensures optimal performance and energy efficiency. Waste management programs focus on reducing, reusing, and recycling materials to minimize environmental impact. Separate collection systems for different types of waste including paper, plastic, and electronic waste facilitate proper recycling. Clerks can contribute by properly segregating waste and participating in recycling programs. Reducing single use items like plastic bottles and disposable cups helps minimize waste generation. reduces environmental impact. Water conservation initiatives help preserve this precious natural resource. Simple measures like fixing leaks promptly, using water efficient fixtures, and avoiding wastage can result in significant water savings. Clerks should be aware of water conservation practices and report any wastage or leaks immediately. The rainwater harvesting systems where feasible can supplement water supply and reduce dependence on external sources. Regular monitoring of water consumption helps identify opportunities for further conservation. Green procurement policies prioritize environmentally friendly products and services. Organizations can choose suppliers who follow sustainable practices and offer eco friendly products. Clerks involved in procurement activities should consider environmental factors when making purchasing decisions. Buying locally produced goods reduces transportation related emissions while supporting local businesses. Choosing durable products reduces replacement frequency and long term environmental impact.' ,
                'Innovation and technology adoption are essential for organizations to remain competitive and improve service delivery in the modern era. Government offices and courts must embrace new technologies and innovative practices to meet changing citizen expectations and improve operational efficiency. The pace of technological change requires continuous learning and adaptation from all employees including clerks who must be prepared to work with new systems and processes. Successful technology adoption requires careful training and change management. Digital transformation initiatives involve replacing manual processes with automated systems to improve efficiency and accuracy. Document management systems, online service portals, and electronic payment systems are examples of digital transformation in government offices. Clerks must be prepared to learn new software applications and adapt their work methods accordingly. Training programs help employees develop necessary skills and confidence to use new technologies effectively. Gradual implementation allows for smooth transition and reduces resistance to change. Artificial intelligence and automation technologies are increasingly being used to handle routine tasks and improve decision making. Chatbots can handle basic citizen inquiries while automated systems can process simple applications without human intervention. Clerks need to understand how these technologies work and how they can complement human capabilities rather than replace them. Focusing on higher value tasks that require human judgment and creativity helps employees remain relevant in an automated environment. Mobile technology and applications have made government services more accessible to citizens. Mobile apps allow citizens to access services, make payments, and track application status from anywhere. Clerks must understand how mobile systems integrate with existing processes and be prepared to assist citizens who use mobile services. Responsive design ensures that the online services work effectively on different devices and screen sizes. Regular testing and updates keep mobile applications functioning smoothly. Data analytics and business intelligence tools help organizations make informed decisions based on data insights. Clerks may be involved in data collection, entry, and basic analysis activities. Understanding how data is used for decision making helps employees appreciate the importance of accuracy and completeness in their work. Visualization tools make complex data more understandable and accessible to non technical users. Regular training in data handling and analysis skills enhances employee capabilities. Cybersecurity awareness is crucial as organizations become more dependent on technology. Clerks must understand common security threats and follow best practices to protect sensitive information. Regular password updates, secure email practices, and awareness of phishing attempts help prevent security breaches.' ,
                'Conflict resolution and mediation skills are valuable assets for clerks who frequently interact with diverse groups of people in their daily work. Conflicts can arise between colleagues, between staff and citizens, or among different departments within an organization. Understanding the principles of conflict resolution helps clerks manage difficult situations professionally and maintain positive working relationships. Effective conflict resolution to a harmonious work environment and improved service delivery to citizens. Understanding the nature of conflicts is the first step in effective resolution. Conflicts often arise from miscommunication, competing interests, resource constraints, or differences in values and perspectives. Clerks should learn to identify the root causes of conflicts rather than focusing only on surface symptoms. Active listening and empathy help in understanding different viewpoints and finding common ground. Recognizing early warning signs of potential conflicts allows for proactive intervention before situations escalate. Communication skills are fundamental to conflict resolution. The clerks must be able to facilitate dialogue between conflicting parties and help them express their concerns constructively. Using neutral language, avoiding blame, and focusing on issues rather than personalities helps create a conducive environment for resolution. Paraphrasing and summarizing help ensure that all parties understand each others positions clearly. Maintaining calm and professional demeanor even in heated situations demonstrates leadership and helps de escalate tensions. Mediation techniques involve helping parties find mutually acceptable solutions to their disputes. Clerks may serve as informal mediators in workplace conflicts or assist in formal mediation processes. The mediators role is to facilitate communication and guide parties toward resolution rather than imposing solutions. Brainstorming sessions can generate creative alternatives that address the interests of all parties. Win win solutions that benefit everyone involved are more likely to be sustainable and prevent future conflicts. Problem solving approaches focus on identifying practical solutions to underlying issues that cause conflicts. Clerks should help parties move beyond positions to understand underlying interests and needs. Collaborative problem solving involves working together to find solutions rather than competing against each other. Breaking complex problems into smaller manageable parts makes resolution more achievable. Regular follow up ensures that agreed solutions are implemented effectively and any new issues are addressed promptly. Emotional intelligence plays a crucial role in conflict resolution. Clerks must be able to recognize and manage their own emotions while helping others deal with their feelings constructively. Stress and frustration often contribute to conflicts and must be addressed alongside substantive issues resolve completely.' ,
                'Performance measurement and evaluation are the systematic processes used to assess the effectiveness and efficiency of organizational activities and individual contributions. Government organizations must demonstrate accountability to citizens and stakeholders by measuring their performance against established standards and objectives. Clerks play important roles in collecting performance data, maintaining records, and supporting evaluation activities. Effective performance measurement helps organizations identify areas for improvement and make informed decisions about resource allocation and strategic planning. Key performance indicators are specific metrics used to measure progress toward organizational goals and objectives. These indicators should be relevant, measurable, achievable, and time bound to provide meaningful insights into performance. Clerks help collect data for various performance indicators including service delivery times, customer satisfaction scores, and error rates. Regular monitoring of key indicators helps identify trends and potential problems before they become serious issues. Dashboard systems provide visual representations of performance data that are easy to understand and interpret. Data collection and analysis are fundamental components of performance measurement systems. Clerks must ensure that data is collected accurately, consistently, and in a timely manner. Standardized data collection procedures help maintain quality and comparability of information across different time periods and organizational units. Electronic data collection systems reduce manual effort and improve accuracy while providing real time access to performance information. Regular validation and verification of data ensures reliability and credibility of performance reports. Benchmarking involves comparing organizational performance with industry standards or best practices to identify opportunities for improvement. Internal benchmarking compares performance across different departments or time periods while external benchmarking compares with other similar organizations. Clerks assist in gathering benchmarking data and preparing comparative analyses. Understanding performance gaps helps organizations set realistic improvement targets and develop appropriate strategies. Regular benchmarking exercises ensure that standards remain current and challenging. Performance reporting communicates results to various stakeholders including management, employees, and the public. Reports should be clear, concise, and focused on key messages that are relevant to the intended audience. Clerks help prepare performance reports and ensure that they are distributed to appropriate stakeholders in a timely manner. Visual presentations including charts, graphs make complex performance data more accessible and understandable. Regular reporting ensure that stakeholders receive information for decision making purposes. Continuous improvement processes use performance measurement results to identify and implement enhancements to organizational activities. Performance data helps prioritize improvement initiatives and allocate resources effectively. Clerks participate in improvement teams and help implement recommended changes.' ,
                'The principles of natural justice are fundamental concepts that ensure fairness and equity in judicial and administrative decision making processes. These principles serve as a safeguard against arbitrary actions by authorities and protect the rights of individuals. The first essential rule of natural justice is that no person shall be a judge in their own cause which prevents bias and ensures impartiality. Any personal or financial interest in a matter can disqualify a decision maker from presiding over a case. The second rule is that both parties must be given a fair opportunity to be heard before a final decision is made. This involves providing adequate notice of the proceedings and allowing the parties to present their evidence and arguments effectively. Clerks support these principles by ensuring that all notices are served correctly and that case records are maintained with absolute transparency. In the modern legal systems the requirement of giving reasoned orders has also become a part of natural justice. Reasoned orders allow the affected parties to understand the logic behind a decision and provide a basis for filing an appeal if necessary. Administrative bodies and tribunals are also bound by these principles when their decisions affect the civil rights of citizens. Failure to follow these rules can lead to the quashing of orders by higher courts through judicial review. The judiciary acts as a watchdog to ensure that every authority follows these core values of justice. Clerks play a vital role in documenting these proceedings and ensuring that the procedural requirements are strictly followed. Effective communication between the court and the litigants is essential for the smooth functioning of the justice delivery system. The evolution of natural justice has led to more inclusive and transparent legal procedures across the globe. By adhering to these standards the legal system maintains public trust and ensures that justice is not only done but is also seen to be done. Continuous training for court staff on these principles is necessary to maintain standards of professional conduct. As the legal landscape changes the core essence of natural justice remains a cornerstone of the rule of law in every democratic society. Effective communication between the court and the litigants essential for the smooth functioning of the justice delivery system. The judiciary acts as a watchdog to ensure that every authority follows these core values of justice. Clerks play a vital role in documenting these proceedings.' ,
                'Civil procedure encompasses the rules and standards that courts follow when adjudicating civil lawsuits and disputes between private parties. The primary objective of civil procedure is to facilitate the just and efficient resolution of cases while minimizing costs and delays. Case management involves the active involvement of the court in supervising the progress of a case from the time of filing until the final judgment. Clerks are essential in this process as they manage the court calendar and ensure that all documents are filed within the prescribed timelines. The initial stage of a civil suit begins with the filing of a plaint which sets out the facts of the case and the relief sought by the plaintiff. Once the plaint is admitted the court issues summons to the defendant to appear and file a written statement in response. Proper service of summons is a critical administrative task that clerks must monitor to avoid procedural delays. During the discovery phase parties exchange relevant information and documents to clarify the issues in dispute. Pre-trial conferences are often held to explore the possibility of settlement through alternative dispute resolution methods such as mediation or arbitration. If a settlement is not reached the case proceeds to trial where evidence is presented and witnesses are examined. The judicial officers rely on accurate case files and organized records to make informed decisions throughout the trial. The use of technology in case management has improved the tracking of case status and automated several administrative functions. Electronic filing systems and digital case records reduce the reliance on physical paper and enhance the accessibility of information. Effective case management requires coordination between judges and the administrative staff to handle the increasing volume of litigation. Clerks help in identifying old cases that require priority attention and assist in the preparation of periodic reports for higher authorities. Strategic planning in the court system focuses on reducing the pendency of cases and improving the overall quality of justice. By streamlining procedures and adopting modern management techniques the judiciary can respond more effectively to the needs of the public. Public confidence in the legal system is directly linked to the speed and fairness with which civil disputes are resolved by the courts. Timely disposal of cases is essential for the rule of law. Proper management ensures that justice is never denied due to administrative failures or procedural errors. Clerks help in identifying old cases.' ,
                'The digital transformation of the Indian judiciary is an ambitious initiative aimed at making the justice system more accessible and efficient. The e-Courts project has played a pivotal role in implementing modern technology in courtrooms across the country. One of the major achievements of this project is the creation of a national judicial data grid that provides real time information on case status and judgments. Virtual courts have been established to handle small cases such as traffic violations and petty offenses through online platforms. This reduces the physical burden on the courts and provides a convenient way for citizens to resolve minor legal issues. The clerks have had to adapt to these changes by learning new digital skills and managing electronic case files. Video conferencing facilities have enabled the recording of evidence and the hearing of arguments from remote locations which is particularly useful for vulnerable witnesses and high security prisoners. Electronic filing of cases allows lawyers and litigants to submit documents from their offices at any time of the day. This shift toward a paperless court system requires robust cybersecurity measures to protect sensitive legal data from unauthorized access. The use of artificial intelligence in the legal sector is also being explored to assist in case research and the management of volumes of documents. Digital displays in court premises provide updated information on case numbers and hearing schedules to the public. Clerks play a key role in updating these systems and ensuring that the information provided to the litigants is accurate. Training programs are regularly conducted for court staff to keep them updated on the latest software and hardware technologies. The digital divide remains a challenge that needs to be addressed to ensure that people in rural areas can also benefit from these advancements. Mobile applications have been developed to provide easy access to court services and notifications to the users. The transition to a digital environment has improved the transparency of court operations and made it easier to monitor the performance of individual courts. As technology continues to evolve the judiciary must remain committed to adopting innovations that enhance the delivery of justice. The collaboration between the legal profession and technology experts is essential for the long term success of the digital transformation in the courts. Digital literacy for all judicial staff is now a mandatory requirement for modern administration. Timely disposal of cases is essential for rule.' ,
                'The registry is the administrative heart of the High Court and is responsible for the smooth functioning of all judicial and non-judicial activities. It serves as the primary interface between the court and the legal fraternity as well as the general public. The Registrar General heads the registry and oversees the work of several departments including the filing section and the judicial branch. Clerks in the registry are responsible for the scrutiny of new petitions and ensuring that they comply with the rules of the court. Any defects in the filing must be noted and communicated to the concerned parties for rectification within a specific time. Once a petition is found to be in order it is registered and assigned a unique case number for further processing. The maintenance of case files is a vital responsibility of the registry staff to prevent loss or damage to important legal documents. The clerks also assist in the preparation of daily cause lists which detail the cases scheduled for hearing before different benches. Accuracy in the cause list is essential to ensure that judges and lawyers are prepared for the days proceedings. The registry also handles the issuance of certified copies of judgments and orders to the parties on request. This involves a systematic process of verification and authentication by the authorized officials. The administration of human resources and the management of the courts budget are also handled by specific sections within the registry. Technological upgrades in the registry have led to the automation of many manual tasks and improved the speed of document processing. The implementation of digital signatures and electronic storage of records has enhanced the security and reliability of court data. Clerks must maintain a high level of confidentiality and integrity while handling sensitive information in the registry. Public relations and the handling of inquiries from litigants are also important aspects of registry work. Effective communication and coordination among different departments are necessary for the overall efficiency of the court administration. The registry plays a critical role in supporting the judges in their judicial duties by providing timely and accurate information. Continuous improvement in registry processes is essential to meet the growing demands of the legal system and to provide better services to the stakeholders. Professionalism and dedication of the registry staff contribute significantly to the reputation and effectiveness of the High Court. Impacts the overall speed of justice delivery.' ,
                'The constitutional law is the body of law that defines the relationship between different entities within a state and the rights of individuals. The Constitution of India is the supreme law of the land and provides the framework for the functioning of the government and the judiciary. Fundamental rights are a core part of the constitution and protect the basic liberties of every citizen from infringement by the state. These rights include the right to equality and freedom of speech and the right to life and personal liberty. The judiciary acts as the guardian of the constitution and has the power of judicial review to strike down any law that violates fundamental rights. High Courts have the authority under Article 226 to issue writs for the enforcement of these rights and for other legal purposes. Clerks assist in the processing of writ petitions and ensure that all procedural requirements are met for their admission. Public interest litigation has emerged as a powerful tool for the protection of the rights of marginalized sections of society. The constitution also outlines the directive principles of state policy which guide the government in creating a just and equitable society. The balance between fundamental rights and the directive principles is a key aspect of constitutional interpretation by the courts. The independence of the judiciary is essential for maintaining the rule of law and protecting the democratic values of the nation. Constitutional amendments are made by the parliament to reflect the changing needs of society while maintaining the basic structure of the constitution. Clerks play a role in maintaining the records of constitutional cases and documenting the landmark judgments that shape the legal history of the country. Understanding the values of the constitution is essential for every legal professional and court staff. The protection of minority rights and the promotion of social justice are integral parts of the constitutional mandate. The courts regularly deal with complex legal questions involving the interpretation of constitutional provisions. Legal aid services are provided to ensure that even the poorest citizens can access the courts for the protection of their rights. The constitution remains a living document that evolves through judicial interpretations and legislative actions to meet the aspirations of the people. By upholding the principles of the constitution the judiciary ensures that the spirit of democracy and justice is preserved for future generations. All court officials must respect the constitution.' ,
                

            ];

            function enforceWordCount(passage, minWords = 400, maxWords = 450) {
                let words = passage.trim().split(/\s+/);
                if (words.length >= minWords && words.length <= maxWords) return words.join(' ');
                while (words.length < minWords) {
                    words.push("justice", "court", "legal", "procedure", "document", "order", "judgment");
                }
                if (words.length > maxWords) {
                    words = words.slice(0, maxWords);
                }
                return words.join(' ');
            }

            const correctedPassages = passages.map(p => enforceWordCount(p, 400, 450));

            // DOM elements
            const setupPanel = document.getElementById('setupPanel');
            const testPanel = document.getElementById('testPanel');
            const resultPanel = document.getElementById('resultPanel');

            const passageSelect = document.getElementById('passageSelect');
            const showSourceCheck = document.getElementById('showSourceCheck');
            const disableBackspaceCheck = document.getElementById('disableBackspaceCheck');
            const downloadPdfBtn = document.getElementById('downloadPdfBtn');
            const startBtn = document.getElementById('startBtn');

            const timerDisplay = document.getElementById('timerDisplay');
            const sourceTextDiv = document.getElementById('sourceText');
            const sourceColumn = document.getElementById('sourceColumn');
            const typedArea = document.getElementById('typedArea');
            const submitTestBtn = document.getElementById('submitTestBtn');

            const statsGrid = document.getElementById('statsGrid');
            const highlightedPassage = document.getElementById('highlightedPassage');
            const retryBtn = document.getElementById('retryBtn');

            let currentPassageText = '';
            let sourceWords = [];
            let selectedPassageIndex = 0;
            let timerInterval = null;
            let timeLeft = 600;
            let startTime = null;
            let showSource = true;
            let disableBackspace = false;
            let testActive = false;

            function formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            function clearTimer() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
            }

            function getSelectedPassage() {
                const val = passageSelect.value;
                if (val === 'random') {
                    return Math.floor(Math.random() * correctedPassages.length);
                }
                return parseInt(val, 10);
            }

            function updateSelectedIndex() {
                selectedPassageIndex = getSelectedPassage();
            }

            function resetView() {
                clearTimer();
                setupPanel.classList.remove('hidden');
                testPanel.style.display = 'none';
                resultPanel.style.display = 'none';
                testActive = false;
                timeLeft = 600;
                timerDisplay.textContent = formatTime(timeLeft);
                typedArea.value = '';
                sourceTextDiv.textContent = '';
                showSource = showSourceCheck.checked;
                disableBackspace = disableBackspaceCheck.checked;
                sourceColumn.style.display = '';
                sourceTextDiv.classList.remove('hidden');
                updateSelectedIndex();
            }

            function downloadPDF() {
             const passage = correctedPassages[selectedPassageIndex];
                if (!passage) {
                  alert('Please select a passage first.');
                     return;
                         }
             const { jsPDF } = window.jspdf;
             const doc = new jsPDF();
             doc.setFont('Courier', 'Normal');
             doc.setFontSize(20);

                // split the text into lines that fit the page width (170mm)
             const lines = doc.splitTextToSize(passage, 170);
    
             let cursorY = 25;               // start position (mm)
             const lineHeight = 10;          // spacing between lines
             const pageHeight = doc.internal.pageSize.height;
             const bottomMargin = 20;

                for (let i = 0; i < lines.length; i++) {
                 // if the next line would go beyond the page, add a new page
                 if (cursorY + lineHeight > pageHeight - bottomMargin) {
                 doc.addPage();
                     cursorY = 25;           // reset cursor on new page
                  }
                  doc.text(lines[i], 14, cursorY);
                 cursorY += lineHeight;
                    }

                 doc.save(`passage_${selectedPassageIndex + 1}.pdf`);
                    }
            function startTest() {
                updateSelectedIndex();
                currentPassageText = correctedPassages[selectedPassageIndex];
                sourceWords = currentPassageText.trim().split(/\s+/);

                showSource = showSourceCheck.checked;
                disableBackspace = disableBackspaceCheck.checked;

                sourceTextDiv.textContent = currentPassageText;
                if (showSource) {
                    sourceColumn.style.display = '';
                    sourceTextDiv.classList.remove('hidden');
                } else {
                    sourceColumn.style.display = 'none';
                    sourceTextDiv.classList.add('hidden');
                }

                typedArea.value = '';
                typedArea.disabled = false;
                typedArea.focus();

                timeLeft = 600;
                timerDisplay.textContent = formatTime(timeLeft);
                startTime = Date.now();

                clearTimer();
                timerInterval = setInterval(() => {
                    timeLeft--;
                    timerDisplay.textContent = formatTime(timeLeft);
                    if (timeLeft <= 0) {
                        clearTimer();
                        submitTest();
                    }
                }, 1000);

                setupPanel.classList.add('hidden');
                testPanel.style.display = 'flex';
                resultPanel.style.display = 'none';
                testActive = true;
            }

            typedArea.addEventListener('keydown', function(e) {
                if (!testActive) return;
                if (disableBackspace && e.key === 'Backspace') {
                    e.preventDefault();
                }
            });

            function submitTest() {
                if (!testActive) return;
                clearTimer();
                testActive = false;
                typedArea.disabled = true;

                const typedRaw = typedArea.value;
                const userWords = typedRaw.trim().split(/\s+/).filter(w => w.length > 0);
                const totalSourceWords = sourceWords.length;
                const typedCount = userWords.length;

                let correctCount = 0;
                for (let i = 0; i < Math.min(typedCount, totalSourceWords); i++) {
                    if (userWords[i].toLowerCase() === sourceWords[i].toLowerCase()) {
                        correctCount++;
                    }
                }
                const wrongWords = typedCount - correctCount;
                const remainingWords = Math.max(0, totalSourceWords - typedCount);

                const elapsedMs = Date.now() - startTime;
                const elapsedMinutes = elapsedMs / 60000;
                const wpm = elapsedMinutes > 0 ? Math.round(correctCount / elapsedMinutes) : 0;

                const accuracy = typedCount === 0 ? 0 : ((correctCount / typedCount) * 100).toFixed(2);

                const penalty = (wrongWords + remainingWords) * 0.25;
                const marks = (20 - penalty).toFixed(2);
                const passFail = parseFloat(marks) >= 10 ? '✅ Pass' : '❌ Fail';

                const statsData = [
                    { label: 'Total Words', value: totalSourceWords },
                    { label: 'Typed Words', value: typedCount },
                    { label: 'Wrong Words', value: wrongWords },
                    { label: 'Remaining', value: remainingWords },
                    { label: 'Speed (WPM)', value: wpm },
                    { label: 'Accuracy %', value: `${accuracy}%` },
                    { label: 'Marks', value: `${marks} / 20` },
                    { label: 'Result', value: passFail }
                ];

                statsGrid.innerHTML = statsData.map(s => `
                    <div class="stat-card">
                        <div class="stat-value">${s.value}</div>
                        <div class="stat-label">${s.label}</div>
                    </div>
                `).join('');

                let highlightedHtml = '';
                for (let i = 0; i < userWords.length; i++) {
                    const word = userWords[i];
                    const isCorrect = i < totalSourceWords && word.toLowerCase() === sourceWords[i].toLowerCase();
                    const cssClass = isCorrect ? 'word-correct' : 'word-wrong';
                    highlightedHtml += `<span class="${cssClass}">${escapeHTML(word)}</span> `;
                }
                highlightedPassage.innerHTML = highlightedHtml.trim();

                testPanel.style.display = 'none';
                resultPanel.style.display = 'flex';
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // Event listeners
            passageSelect.addEventListener('change', updateSelectedIndex);
            startBtn.addEventListener('click', startTest);
            submitTestBtn.addEventListener('click', submitTest);
            retryBtn.addEventListener('click', resetView);
            downloadPdfBtn.addEventListener('click', downloadPDF);

            // Initialize
            updateSelectedIndex();
            resetView();
        })();
    </script>
</body>
