    const passages = [
        // Passage 1
        `On 24 April 2026, the political developments involving Raghav Chadha and Aam Aadmi Party brought the anti-defection law back into sharp focus. Interestingly, the date carries a distinct constitutional significance. On 24 April 1973, the Supreme Court delivered its landmark judgment in Kesavananda Bharati v. State of Kerala, laying down the basic structure doctrine - a doctrine that safeguards the core features of the Constitution, including democracy itself.

The Tenth Schedule was introduced by the Constitution (Fifty-Second Amendment) Act, 1985 to combat what Parliament described as the "evil of political defections", a phenomenon that had begun to destabilise governments and erode public trust. Legislators, elected on the ideological platform of one political party, were frequently shifting allegiance post-election, altering the composition of the House and even toppling governments.

This was not merely a question of political opportunism. It struck at the heart of representative democracy. Voters cast their ballots not only for individuals but for party-based ideologies and programmes. When a legislator defects, the electorate's mandate is effectively rewritten after the fact. The Supreme Court has consistently recognised this foundational concern. In Kihoto Hollohan v. Zachillhu (1992), the Supreme Court upheld the constitutional validity of the Tenth Schedule, highlighting its role in preserving democratic stability. Similarly, in S. R. Bommai v. Union of India (1994) and Kuldip Nayar v. Union of India (2006), the Court observed that political parties are central to India's democratic framework, and that the anti-defection law exists to protect that structure.

The phrase "voluntarily gives up membership" has been interpreted broadly. In Ravi S. Naik v. Union of India (1994), it was held that resignation is not necessary and that conduct alone may suffice to infer that a member has abandoned the party. This was reiterated in G. Viswanathan v. Speaker Tamil Nadu Assembly (1996), where even expelled members were held to continue belonging to their original party for the purposes of disqualification, and joining another party amounted to "voluntarily giving up" membership. The question is whether these two conditions are independent, or whether the second is contingent upon the first. A careful reading of the provision suggests that the merger of the original political party is the foundational event, while the two-thirds requirement is a qualifying condition that determines whether individual legislators may claim its benefit. The structure of the paragraph, particularly the opening words, "where his original political party merges...", makes this clear.`,

        // Passage 2
        `"A Highway Murder victim was a Teacher", "A Kerala Doctor stabbed 27 times with scissors by school teacher in hospital; accused sentenced to life 3 years after murder" becomes national headlines only when the victim is labeled Teacher or Doctor allegedly murdered by a School Teacher. The crime remains the same; only the professional prefix makes it newsworthy. This is identity-baiting, a trend where media outlets weaponize a suspect's professional status to manufacture scandal out of mundane offenses. By doing so, editors don't just report a crime; they engineer a fall from grace for the sake of a click, leading to profound ethical breaches and unfair reputational harm.

The primary ethical concern with highlighting professional identities in crime reporting is the creation of a misleading narrative. A person's profession carries specific social capital and expectations of conduct. When a headline leads with a prestigious or sensitive role, such as a member of the armed forces or a police officer, it implicitly suggests that the crime is a betrayal of that specific professional trust. If the offence is purely personal, the label becomes an irrelevant detail used solely to pique curiosity or provoke a stronger emotional reaction from the reader.

The weaponization of professional identity inflicts cumulative-collateral damage on the institution as a spill-over effect. There is no protective shield exists for other high-trust vocations such as medicine, education, or defense. When a headline gratuitously leads with Senior Doctor in the context of a mundane domestic scuffle or a crime devoid of any professional character, the media triggers a psychological reverse halo effect. By repeatedly associating prestigious titles with criminal deviance in irrelevant contexts, editors foster a systemic trust deficit for the sake of sensationalism. This practice slowly chips away at the social contract between the public and these professional bodies, essentially trading decades of earned institutional respect for the fleeting engagement of a single news cycle. Furthermore, this disparity creates a dangerous imbalance in how society perceives professional integrity. When it comes to a surgeon or a teacher, the patient's faith in their surgeon or a student's respect for the teacher's professor is built on a foundation of professional dignity, a foundation that is unfairly rattled when the media utilizes these titles as props for reporting. The tension here lies between Article 19(1)(a) of the Indian Constitution, which guarantees freedom of speech and expression, and the right to reputation, which the Supreme Court has recognized as an integral part of the right to life under Article 21.`,

        // Passage 3
        `What if the pursuit of clean energy begins by dismantling the very ecosystems it claims to protect? India's accelerated transition to solar energy is widely framed as an unqualified environmental good. Yet, recent developments in western Rajasthan complicate this narrative in significant ways. The large-scale felling of the Khejri tree for solar infrastructure has triggered sustained resistance from the Bishnoi community. This contestation foregrounds a central question of public law: Can decarbonisation be pursued in a manner that dilutes statutory safeguards, constitutional guarantees, and settled environmental principles?

The legal framework governing such projects is neither sparse nor ambiguous. The Environment Protection Act, 1986 empowers the executive to take measures necessary to protect and improve environmental quality, while the Forest Conservation Act, 1980 imposes strict limitations on the diversion of forest land for non-forest purposes. Complementing these statutes is the Environmental Impact Assessment (EIA) regime, which mandates prior environmental clearance based on a comprehensive evaluation of potential impacts. In theory, this architecture reflects a robust commitment to environmental governance. In practice, however, its application to large-scale solar projects reveals significant gaps between normative intent and administrative execution.

A critical issue lies in the quality and depth of environmental appraisal. Solar projects, particularly in ecologically sensitive zones, require a careful assessment of cumulative impacts on soil integrity, biodiversity, microclimatic patterns, and traditional land-use systems. Yet, there is increasing concern that environmental clearances are often granted on the basis of fragmented or inadequate assessments, with insufficient engagement with long-term ecological consequences. This is especially problematic in desert ecosystems, where ecological resilience is limited and recovery from disruption is slow.

The ecological significance of the Khejri tree underscores this concern. As a keystone species in arid regions, it plays a vital role in nitrogen fixation, soil conservation, and sustaining agro-pastoral livelihoods. Its presence supports a delicate ecological equilibrium that cannot be easily replicated. The removal of such a species, therefore, is not a neutral act of land preparation; it constitutes a substantive ecological transformation with far-reaching consequences.

This brings into sharp focus the constitutional and jurisprudential principles that govern environmental decision-making in India. The Supreme Court, in a series of landmark decisions, has articulated the doctrine of sustainable development as an integral part of Indian environmental law. In MC Mehta v Union of India, the Court emphasised that economic development must be balanced with environmental protection. Similarly, in T N Godavarman Thirumulpad vs. Union of India, it adopted an expansive interpretation of forest conservation, prioritising ecological preservation over competing land uses.`,

        // Passage 4
        `In a country where a quarter of the urban workforce is women workplace equity becomes extremely important, not just in terms of professional opportunities, but in terms of mental and emotional workload. Workplace harassment cases are a testament to how women have to disproportionately bear the burden of gender dynamics and power hierarchies in professional spaces. Numbers reflect reality. Nearly 48% of women report some form of workplace harassment, according to a survey report by the National Commission for Women. This also reflects how they constantly need to be vigilant, modulate their behaviour, guard their bodies and navigate spaces that can become uncomfortable. This is not just incidental, but structural, affecting not just their dignity, but also their participation and performance at work.

In this context, the recent Bombay High Court ruling in the case of Abhijit Baswant Nigudkar v. The state of Maharashtra that staring at a colleague's chest, however inappropriate, does not amount to voyeurism under Section 354C of the Indian Penal Code, 1860, has drawn attention to what appears to be a lacuna in protection. The Court held that voyeurism requires watching or recording a woman engaged in a "private act", and that mere staring in a workplace setting, even if offensive, does not fulfill this caveat. The Court, in its textual interpretation revealed an unease - the conduct is clearly harmful, but does not fit neatly within the contours of a defined criminal offence. In this scenario, a question arises, is the aggrieved woman then, left without any legal remedy? The answer is multilayered.

The Court's interpretation cannot be faulted, because the provision has been narrowly drafted. It criminalises a very specific form of harassment - one corresponding to intrusion of privacy - watching or photographing a woman engaged in acts where privacy is reasonably expected. The sine qua non for the provision being - "a private act" - the absence of which renders any act legally immune from prosecution under this section. A general sense of moral wrongdoing falls short of fulfilling established statutory ingredients.

If broadly looked at, even in case of sexual harassment laws, courts have often been open to expansively reading statutory provisions. The case in question being that of "outraging the modesty of a woman" under Section 354 of IPC. In the landmark case of State of Punjab v. Major Singh, the Supreme Court gave the term 'modesty' a broad and evolving meaning, holding that the essence of the offence lies not in the act, but in the consequence..`,

        // Passage 5
        `When a Rajya Sabha MP shared an Urdu poem on X, the Gujarat police saw incitement. however the Supreme Court saw poetry. But the more interesting story is not that the FIR was quashed — it is the standard the Court used to quash it. Resurrecting a 1947 pre-independence Nagpur High Court formulation, the Court held that speech must be judged through the eyes of a "reasonable, strong-minded, firm and courageous" person. This raises a question nobody has yet asked: who exactly is this person, and what work is this standard silently doing in India's free speech jurisprudence? Imran Pratapgadhi, a sitting Rajya Sabha member, attended a mass wedding ceremony in Jamnagar, Gujarat on December 29, 2024. Post the ceremony, he uploaded a video on X with an Urdu poem "Ae khoon ke pyase baat suno", set in the background, dealing with an abstract sense of resistance, sacrifice and injustice. A private complainant filed a complaint on the ground that the poem was likely to incite communal discord and disharmony between different communities, following which the Jamnagar police filed an FIR under sections 196, 197(1), 299, 302, 57 and 3(5) of the Bharatiya Nyaya Sanhita, 2023.

Pratapgadhi sought quashing of the FIR before the Gujarat High Court, which dismissed his plea citing that the investigation was in its infancy, and a look at the public reaction to the post revealed the likely consequences in terms of potential communal disharmony. It added that, as an MP, Pratapgadhi should be more careful in his public pronouncements. Dissatisfied, he appealed to the Supreme Court, which stayed further proceedings before ultimately allowing his appeal.

Speaking through Justice Abhay S.Oka, the SC held that the poem, prima facie, did not make out any offence as it had no religious or communal color to it, nor could it be deemed anti-national. The Court quashed the entire FIR, calling the registration a "mechanical exercise" and a "clear abuse of process of law". It also held that a mandatory preliminary enquiry, required to be made before registration of an FIR for speech offences under Section 173(3) of the Bharatiya Nagarik Suraksha Sanhita, 2023, was not done in the instant case. Beyond its procedural findings, the Court also developed a substantive test to measure the impact of potentially inciting speech that would arguably be the more significant outcome of the judgment. In determining whether the poem attracted the offences under Sections 196, 197, 299 and 302 of the BNS, the Court did not merely read the poem and declare it harmless.`,

        // Passage 6
        `The case of In Re: Phalodi Accident, delivered on April 13, 2026, concerns a series of very tragic incidents that happened in early November 2025, where two accidents in the States of Rajasthan and Telangana resulted in the death of 34 persons within two days. These accidents, which took place on Bharatmala Expressway at Phalodi in Rajasthan and in Rangareddy District in Telangana State, cannot be called isolated incidents because they revealed a certain trend of neglecting the safety measures of highways in India. The Supreme Court of India, taking suo motu cognizance of the incident, did not consider the cases under the heading of ordinary accidents and noted that all those casualties were "evitable" due to illegal roadside encroachment, improper parking practice, insufficient supervision, and poor emergency arrangements. In addition, notices were sent to officials of several departments, and with the help of the Amicus Curiae and the Solicitor General, the Court was able to draft interim directions that went far beyond mere facts of the cases. Thus, the judgment reveals much more than judicial reaction to a tragedy.

It is certainly not for the first time that this Article has been subjected to such an expansive interpretation; however, when applied to matters concerning the safety of people while using highways, the application takes on a new dimension. Highways form part of the public realm used by people every day. When there are dangers that can be avoided, yet are ignored due to negligence, it becomes a violation of the rights enshrined in this Article.

        `As algorithms begin to testify in our courtrooms, the scales of justice are facing a digital recalibration that challenges centuries of traditional jurisprudence. There is a need to move beyond the Section 65B straitjacket to frame AI not merely as a digital record, but as a distinct form of machine-generated expert opinion. By leveraging the historic transition from the Indian Evidence Act to the Bhartiya Sakshya Adhiniyam, a concrete statutory roadmap specifically a particularly designed provision to bridge the analytical gap between opaque algorithmic logic and the fundamental requirements of judicial truth is required. The integration of these tools offers a glimpse into a high-efficiency future, but it also forces to confront the "black box" at the heart of the courtroom.

In the digital sphere, these tools recover deleted data, identify malware, and trace anonymous blockchain transactions in cryptocurrency cases, while AI-powered electronic discovery platforms can review millions of documents for relevance far more accurately than human teams prone to fatigue. Can an AI's expert opinion be considered under BSA? AI has none of its own reasoning per se, however it can give objective analysis according to the subjectivity and prejudice fed into it, which is humanly. This further indicates its opinion would be more objective than a subjective human being. In India, the admissibility of AI generated evidences would fall under Section 60 and 63 BSA to manage electronic records, landmark cases like Anvar P.V. and Arjun Panditrao Khotkar have established that compliance with Section 65B(4) certificates is mandatory to ensure authenticity, yet this framework remains a straitjacket for dynamic AI outputs. The primary hurdle is the "black-box problem", where the internal logic of an algorithm is opaque even to its developers, often creating an "analytical gap" between raw data and the conclusion that may lead a court to exclude the evidence. Consequently, AI generated proof in India is currently viewed as being in a rudimentary stage, requiring either a judge or a separate human expert to re-verify the methodology and facts before it can be legally relied upon.`,

        `As the Supreme Court's April 2026 ruling in Madan Singh v. State of Haryana effectively barricades the backdoor to permanency by denying regularisation to ad hoc employees hired without formal recruitment, the promise of security has transitioned from a legitimate expectation to legal mirage. As the Apex Court noted in D.N. Banerji v. P.R. Mukherjee, industrial disputes must be viewed through the standpoint of "status" and social justice rather than a mere contractual agreement. However, as India's gig economy is projected to grow by 23% by 2025, reaching a workforce of 15 million, the Code on Social Security (CSS), 2020 and the Industrial Relations (IR) Code, 2020 represent a decisive reversal of this trend. These reforms institutionalise contractualization as a strategic tool to fragment labour rights, creating a workforce that is 'permanently temporary' where the illusion of parity in benefits masks the systematic destruction of job security. The central novelty of this legislative shift is the Convergence Thesis, which posits that the formal and informal sector are merging into a singular, permanently temporary workforce. This gigification of the formal sector allows employers to engage FTE workers for core activities, primary business functions previously reserved for permanent staff, thereby eroding the stability of the standard employment relationship. This shift reflects a move from a protective intervention toward a model that prioritises business exigencies, allowing firms to meet short-term needs without the burden of long-term statutory commitments.

The new labour regime introduces specific terms to categorise the flexible workforce, yet these definitions create overlapping compliance buckets for employers. Fixed-Term Employment (FTE) is defined under Section 2(34) CSS as an employee engaged directly by an employer through a written contract for a pre-determined period. This definition establishes four essential elements; a written contract, a pre-defined tenure, a direct relationship with the principal employer, and the individual qualifying as an "employee". However, this framework functions as a lion in sheep's skin because the IR Code explicitly excludes the automatic expiration of an FTE contract from the definition of retrenchment.

        `The recent recusal controversy in the Arvind Kejriwal proceedings before the Delhi High Court has revived an old but unresolved institutional question: how should courts respond when apprehension of bias is alleged against the judge seized of the matter? The immediate temptation is to reduce every such controversy either to judicial hypersensitivity or to political theatre. Both reactions are inadequate. A recusal plea, even when it fails, touches the moral architecture of adjudication, because courts derive authority not merely from law but from public confidence in impartiality. That confidence cannot be left entirely to improvised responses. At a time when courtroom developments are instantaneously amplified in the public domain, the judiciary must ensure that genuine concerns are addressed with principled clarity while speculative attacks are firmly repelled.

Indian law already recognises the governing doctrine. In Ranjit Thakur v. Union of India, (1987) 4 SCC 611, the Supreme Court held that the relevant test is whether a reasonable person, in possession of the relevant facts, would apprehend likelihood of bias. The emphasis, therefore, is objective and institutional, not based on the personal discomfort of a litigant. Equally, in Indore Development Authority v. Manoharlal, (2020) 8 SCC 129, the Court warned against recusal being converted into a device for bench hunting or forum shopping merely because a judge had expressed a prior view on law. These two decisions, read together, yield a sound constitutional balance: real conflict must disqualify, but manufactured perception cannot dictate roster or adjudication.

Yet the present framework remains underdeveloped at the procedural level. In practice, recusal questions in the higher judiciary are often left to convention, individual conscience, and fragmented practice directions. That may preserve decisional autonomy, but it does not always satisfy the public demand for visible fairness. The problem is not that judges decide recusal pleas themselves; the problem is that there is no nationally articulated standard explaining when disclosure is advisable, when recusal is ordinarily warranted, and when a plea is plainly abusive. Judicial independence is not weakened by transparent standards. On the contrary, it is strengthened when the institution demonstrates that impartiality is being protected by rule, not by personal preference or public pressure.

        `The Aam Aadmi Party government in Punjab has, in nearly four years in office, been conspicuous for its legislative inactivity. Having swept to power in 2022 on a wave of popular mandate, it has passed precious little by way of substantive law reform. It is, therefore, both striking and concerning that the government has chosen, in what is effectively the final year of its first term, to wade into one of the most politically charged and legally sensitive domains possible: the criminalisation of sacrilege. The Jaagat Jot Sri Guru Granth Sahib Satkar (Amendment) Bill, 2026, passed by the Punjab Vidhan Sabha, prescribes a minimum punishment of seven years and a maximum of twenty years of imprisonment — extendable to life — for acts of sacrilege against the Saroop(s) of Sri Guru Granth Sahib. The timing, the content, and the legal architecture of this legislation warrant serious public scrutiny. Let us begin with the foundational question: was this law necessary at all? The answer, on a plain reading of existing statutes, is no. Section 295A of the Indian Penal Code, now retained in substantially identical form under the Bharatiya Nyaya Sanhita (BNS), already penalises deliberate and malicious acts intended to outrage religious feelings. It applies across all religions and has been on the books since 1927. The sacrilege of a sacred scripture — any sacred scripture — is already cognisable under this provision. The Punjab government has not explained why existing law was inadequate, nor has it provided any empirical basis for the claim that stronger, religion-specific legislation was required.

The punishment prescribed under the amended Act deserves particular attention, because it exposes the legislation's fundamental disproportionality. A minimum of seven years for sacrilege, rising to twenty years and potentially life imprisonment, places this offence in the same bracket as rape under the BNS, and above the minimum punishment prescribed for terrorist acts under Section 15 of the Unlawful Activities Prevention Act (UAPA), where the floor is five years and the ceiling is life imprisonment. Dacoity with murder under the IPC carries a similar sentencing range. One is compelled to ask: is the Punjab government of the view that the sacrilege of a holy book is as grave — or graver — than rape, gang rape, dacoity with murder or a terrorist attack? Even if one fully appreciates the sanctity of Sri Guru Granth Sahib to the Sikh faith, the principle of proportionality in criminal law demands that punishment be commensurate with harm.`,

        `On the 26th of November each year, the Republic pauses to mark Constitution Day - the day in 1949 when the Constituent Assembly adopted its supreme document and gifted a continent of people their fundamental law. It is a date rightly venerated. Yet India has another date, equally consequential, equally dramatic, and almost wholly uncelebrated - the 24th of April, 1973. On that day, in a wood-panelled courtroom in New Delhi, thirteen judges of the Supreme Court of India rose, one after another, and delivered eleven separate judgments running to 703 pages, at the end of which the Republic was saved from itself. The case was Kesavananda Bharati Sripadagalvaru & Ors. v. State of Kerala & Anr. [AIR 1973 SC 1461]. This April, as we mark fifty-three years of that reckoning, it is time to argue - with all the passion of a convinced constitutionalist - that the 24th of April deserves to stand beside the 26th of November in the civic memory of India. If the latter was the day we wrote the soul of the Republic, the former was the day we refused to let it be traded away.

The path to that courtroom began in the land-rich, spiritually ancient Edneer Mutt, a Hindu monastery in the Kasaragod district of Kerala, presided over by His Holiness Kesavananda Bharati Sripadagalvaru. He was barely thirty when the Kerala government, powered by the zeal of the land reform movement, moved to acquire the mutt's agricultural lands under the Kerala Land Reforms Act, 1963, and its subsequent amendments. The Swamiji - who would never meet his own lawyer - filed a writ petition in the Supreme Court in February 1970 under Article 32, challenging the restriction on his right to manage religious property. The case, modest in its origins as a quarrel over farm land, was destined to answer the most fateful constitutional question of independent India: does Parliament possess an unlimited power to rewrite the Constitution as it pleases, or does the Constitution contain an inviolable soul?

It was Nani Palkhivala — Nanabhooy Palkhivala, India's foremost constitutional advocate — who grasped the epochal opportunity within the humble petition. He saw in it the perfect vehicle to challenge a cascade of constitutional amendments that the Indira Gandhi government had enacted to override Supreme Court judgments protecting property rights and fundamental freedoms. The 24th, 25th and 29th Amendments had been passed in rapid succession, asserting Parliament's absolute power to alter even fundamental rights.`,

        `The Insolvency and Bankruptcy Code, 2016 is often hailed as the most significant economic reform since the 1991 liberalisation. The pre-existing insolvency landscape was a creditor-hostile regime, scattered with numerous overlapping statutes. The Code brought about a unified, time-bound ecosystem, replacing the debtor with the creditor as the focal point, and established the National Company Law Tribunal, National Company Law Appellate Tribunal, and the Insolvency and Bankruptcy Board of India as integrated institutions.

        `Code of civil procedure, 1908 (CPC) does not provide for the definition of ex-parte decree or ex-parte judgment. The term ex parte is a Latin term which means "from one side" or "for one party only". In other words, in an ex parte proceeding the case of the plaintiff proceeds in the absence of the defendant.

Procedures analogous to ex parte proceedings can be found as far back as Roman law. The provision regarding setting aside of an ex parte decree first found it place under section 119 of the 1859 code. After 1859 code was repealed, it was covered under section 108 of 1877 code. Under the 1882 code it was covered under section 108. It finally found it's way in the present code of 1908 under order 9 rule 13. For the benefit of readers order 9 rule 13 is reproduced below -

Now coming to the heart of the matter, which is the explanation appended to order 9 rule 13, it was introduced by Act 104 of 1976, s.59 explanation. At this juncture, it would be apposite to ascertain what weighed with the law commission that it recommended insertion of an explanation in it's 54th report.

The pertinent question which was in front of the law commission was whether an application for setting aside an ex parte decree can be entertained by the trial court, after an appeal against the ex parte decree has been dismissed summarily by the appellate court? The commission noted a difference of opinion amongst the various high courts regarding this issue. In order to resolve the issue, the commission recommended that an explanation needs to be added to order 9 rule 13 CPC. The recommendation of the law commission reads thus.

"Explanation - where there has been an appeal against the decree passed in the absence of the defendant, and the appeal has been disposed of, no application under this rule shall lie in respect of that decree" It would be apposite to note here that, though the recommendation found it's way in the code by the 1976 amendment, but not exactly in the same words as used by the law commission. In order to clear the air, the legislature consciously added the words "on any ground other than the ground that the appellant has withdrawn the appeal". The effect of which is that, no matter on what ground the appeal is dismissed by the appellate court, apart from appellant withdrawing his appeal, the decree of the trial court gets submerged into the appellate decree.`,

        `Waiting for the next date can be anxiety-inducing. I don't mean that romantically. I'm referring to what most litigants face as their cases wind through the Indian justice system. Two questions that counsel routinely receive from clients are 'what happened in my case' and 'when is the next court hearing date'. The answer to the second question - the hearing date - is more complex than meets the eye.

The Supreme Court of India, after a preliminary hearing, sets subsequent hearing dates in a few different ways. The Court, at times, orders a fixed or specified next date of hearing. In such case, for example, the fortunate litigant will see included in the court's order something to the effect of: "list on 27.08.2026". Quite often though, the Court directs the listing of any case after a set period of time, say after "two weeks" or "six weeks". While one might expect the case to automatically list after the set period, it does not. In reality, the order means 'don't list this case before such time and await a computerized tentative next date'. In this scenario, the online case status on the Supreme Court website soon reflects a tentative next date. There's also the practice where some orders have no mention of a next date either before the Court or the Registrar and merely grants a specific period of time to file pleadings within. This again invites a tentative computerized date.

Generally, a tentative online date, unless backed by a Court order specifying a fixed date, remains just that - wholly tentative. When the tentative date arrives, the case doesn't get assigned to the Court docket for an actual listing. Instead, the tentative date soon jumps to another tentative computerized date, often in endless repeated cycles. The only way to capture the ever-elusive Tentative Date and turn it into an actual court assigned date, is for an Advocate-on Record in the case to file a "not-to-be-deleted" application. This is essentially a procedural memo that requests the Court to convert the next tentative date into a Court assigned date that guarantees an actual listing. Not to be deleted mentioning's are rather generously allowed by the Court but leave your next date to the mercy of technology.

        `In a landmark decision that will be remembered as a moment of constitutional reassertion, the Supreme Court of the United States (SCOTUS/the Court) has declined to read the words 'regulate importation' under Section 1702(a)(1)(B) of the International Emergency Economic Powers Act (IEEPA) as a charter for unbridled presidential authority to impose tariffs. In doing so, the Court set aside one of the most consequential assertions of unbounded executive authority by US President Donald Trump. As discussed earlier on this platform, the US Court of International Trade and Court of Appeals for the Federal Circuit had struck down the tariff measure adopted by the Trump-administration as unconstitutional. The question before the SCOTUS hinged on the interpretation of section 1702 of the IEEPA to read (or not to read) 'regulate importation' to include wide discretionary power to levy tariffs and delegation of excessive authority in explicit or implicit terms.

Interestingly, opinions in matters having drastic political and economic ramifications have rarely been rendered by the SCOTUS in a singular voice without any discordant notes. Treading a similar path, the decision of the Court was sharply divided in defining the contours of executive power within the statutory framework of IEEPA. Its central probing revolved around the applicability of Major Questions Doctrine that plays a critical role in discerning congressional intent behind any statute whenever a highly consequential authority is claimed to be delegated by Congress to the Executive.

The separation of powers doctrine is the guiding principle underpinning Major Questions Doctrine. It is also underscored by the philosophy that Congress does not hide elephants in mouseholes - effectively meaning, any highly consequential power is explicitly delegated by the Congress, thereby obviating any implicit claim to such authority by the Executive. MQD originated in the backdrop of administrative law. Justice Stephen Breyer, who is credited with giving the doctrine intellectual heft long before joining the US Supreme Court, argued that Congress answers 'major questions' itself and does not leave them open to executive exploitation. From his viewpoint, this doctrine is more informed by judicial pragmatism, derived from a reasonable interpretation of laws enacted by Congress. For example, in Whitman v. American Trucking (2001), few trucking companies challenged the Environmental Protection Agency's (EPA) prescribed air quality standards for non-consideration of the economic cost of implementation. After carefully analysing the Clean Air Act, the US Supreme Court noted that powers of the EPA are statutorily well-defined which, however, do not include an assessment of implementation cost. In conclusion, the court held if Congress had conferred such authority on the EPA, it would have done so explicitly as it 'does not hide elephants in mouseholes'. Following this conclusion, the Court implicitly applied the MQD principle to the Clean Air Act, a process driven by reasonable interpretation of laws.`,

        `The global energy transition has produced a new class of strategic asset. Lithium, cobalt, rare earth elements and a handful of other minerals are now as consequential to national industrial policy as oil was to an earlier generation. Electric vehicles, renewable energy infrastructure and advanced defence technologies are all critically dependent on secure and reliable supply chains for these materials. India and Australia are well placed to shape that supply chain together, and the legal architecture to support that partnership is largely in place.

        `Many have commented on the use of the word "shall" in this sub-section. Courts have also offered different opinions in this regard. One view is that it is mandatory, and the other is that it is directory since there are no consequences provided for this sub-section's non-compliance. Some may still argue that the consequences for non-compliance, though not in built within Section 23, are still found within the larger ambit of Section 29A of the Arbitration Act. The Supreme Court, through its orders In Re: Cognizance for Extension of Limitation, including in its order dated 23rd March 2020, may have also tacitly approved a mandatory interpretation for Section 23(4) by excluding periods "prescribed" under Section 23(4) and Section 29A of the Arbitration Act. Would these orders be of precedential value in the context of Section 23(4)? That is a different column for a different day. But this uncertainty in Section 23(4) has not gone unnoticed. Report of the Expert Committee to Examine the Working of the Arbitration Law submitted to the Law Ministry on 7th February 2024 has recommended substituting Statement of Claim and Defense with "pleadings" to give it more clarity. The 2024 Amendment Bill however did not incorporate any amendment in the draft inviting comments from the general public. An Arbitrator receives notice of his appointment on 1st January 2026. A preliminary meeting is called for. A schedule of completion of pleadings is set out by the Arbitrator. 45 days are given to the Claimant to file its Statement of Claim and another 45 days are given to the Respondent to file its Statement of Defence. The Claimant does file its Statement of Claim on time. Extensions are granted not once, but twice, with costs imposed on the Claimant. On the third occasion, an Arbitrator passes a conditional order stating that if the Statement of Claim is not filed, by 15th June 2026, the Arbitrator shall terminate the proceedings under Section 25(a) of the Arbitration Act. The Claimant finally files its Statement of Claim running into 300 pages accompanied with 200 documents. The number of pages total to 5000. Is a Respondent not entitled to say, "Look here Mr. Arbitrator, I am aware that Section 23(4) states that the Statement of Claim and Defence is to be completed in 6 months from 1st January 2026, but you can't expect me to file a Statement of Defence in 15 days!"`,

        `India stands at a constitutional crossroads with the introduction of the Constitution (131st Amendment) Bill, 2026, a proposal that seeks not merely to expand the Lok Sabha to 850 seats but to recalibrate the very grammar of political representation in India. While the stated objective is to align representation more closely with demographic realities, the amendment raises a foundational question - can numerical equality alone define democratic legitimacy in a Constitution that is equally committed to federal balance? The Bill, therefore, is not just an exercise in institutional expansion, but a moment of constitutional rethinking - one that demands scrutiny beyond its surface rationale.

        // Passage 19
        `In 2026, India will face a constitutional issue that could remodel the Union balance: Who represents India at Parliament and on what grounds? The allocation of seats in the Lok Sabha has been based on the demographic realities that have been frozen in time for more than half a century. The interstate seat allocation was also made dependent on the 1971 Census under the 42nd, 84th and 87th Constitutional Amendments, which was extended till the first Census after 2026. What was initially an upright attempt to offer incentives to the population and even to secure states who have achieved the goal of lowering the population rate, has grown to be a structural conflict in the federal design.

As the freeze will expire, the reallocation of seats according to the current population would greatly benefit states with high growth especially in northern and central India over those with lower ranks like those of the south and some eastern states which already have experienced demographic transition. This poses a structural dilemma of how India can balance the principle of democracy of "one person, one vote" and the requirements of the federal system to safeguard those states that have done well in terms of social and demographic performance.

        `Public spaces in India are often described as "for everyone." It sounds inclusive. It reads well in policy documents. But step into a railway station, a crowded bus stand, or a government office, and a simple question arises, does "everyone" truly include a mother with an infant? For most women, the answer is still no. A basic, non-negotiable need - safe, clean, and private space for breastfeeding remains largely invisible in the design of public infrastructure. What should be routine is treated as exceptional. What should be accommodated is pushed into discomfort. This is not merely an infrastructural gap; it reflects a deeper institutional indifference. 19 February 2025, the Supreme Court addressed this issue in Maatr Sparsh - An Initiative by Avyaan Foundation v. Union of India. The case arose from a public interest petition seeking the creation of breastfeeding rooms, childcare spaces, and creche facilities in public places. The demand was straightforward. The implications, however, were far-reaching. The Court did not treat breastfeeding as a matter of convenience. It located it firmly within the framework of constitutional rights. Breastfeeding, the Court observed, is an integral part of a child's right to life under Article 21. Equally, a mother's dignity, privacy, and bodily autonomy are not optional considerations, they are protected constitutional values. In one stroke, the Court moved the conversation from "facility" to "right."

        `Put yourself in a hypothetical situation where you have decided to marry someone whom you love but who is from a different religion than you are. In order to legalize your marriage, you approach the marriage officer's office, complete all the paperwork, and then wait. Meanwhile, your name, address, and intention to marry your love are posted on a public noticeboard, available for the general public to see, object to, or act upon the same. The people in your community who are against this marriage because of marrying outside your faith may wish you harm, but all have access to this very information about your marriage. This is the reality created by the Special Marriage Act, 1954 (hereinafter, SMA).

        `In recent years, many OTT web series and films have portrayed juvenile crime, highlighting the complexities of the debate surrounding it. These films and web series reflect public perceptions of law and crime, as well as how the legal system views these issues. One significant area of debate is bail for children in conflict with the law. With the growing number of heinous offences committed by minors, the public often feels that the severity of the crime should determine bail, and that the law allows minors to get away very easily, as in the Pune Porsche Case. However, the law dictates that the child's age and reformability take precedence. This article discusses bail for Children in Conflict with the law under Section 12 of the JJ Act, particularly emphasising one of the grounds for denying bail to children in conflict with the law, i.e., "defeat the ends of justice."

        `The summary rejection of the CEC removal notice by the Speaker and the Chairman- absent a reasoned explanation- marks a significant departure from the principles of natural justice. As "speaking orders" are foundational to the rule of law, presiding officers, when acting in an adjudicatory capacity, are bound by judicial precedents like Kihoto Hollohan to ensure transparency over institutional silence.

        `The question then arises: why does the narrative of judicial pendency persist, so readily linked with inefficiency and even corruption? The answer lies not in data, but in its absence. There is no meaningful statistical framework that captures how a case actually moves through its lifespan—how much time is spent in investigation, in securing service, in awaiting witnesses, in execution, and where responsibility for delay truly lies. What exists instead are fragmented indicators. A judicial officer, for instance, submits periodic statements—often around 30 returns in a month—to the High Court and the Supreme Court. These reflect disposal, institution, and pendency. They do not reflect the anatomy of delay.

        `The recent NCERT textbook reference linking judicial pendency with corruption—met with sharp disapproval from the Supreme Court—was followed by an equally sharp public response: when over 55 million cases remain pending, the judiciary cannot claim to be beyond criticism. This exchange has reopened a familiar but inadequately examined debate. Pendency is repeatedly invoked as evidence of judicial failure. Yet before accepting that conclusion, a more fundamental question must be asked—what do these numbers actually represent?

Pendency is often treated as a measure of judicial lethargy, overlooking the functional structure of a trial. A court does not generate its own raw material; it adjudicates what is brought before it. The case belongs to the parties—whether citizen or the State—and it is they who must produce evidence and move the process forward. When witnesses are not produced, documents are not filed, investigations remain incomplete, or procedure is used to delay, the process stalls. What is then described as judicial inaction is, in substance, a halt in the process itself. To attribute such delay to the court is to blame a mirror for the reflection it shows. Much of what is counted as judicial backlog is, in fact, the accumulation of delay beyond the court's control—most visibly in the district judiciary, where nearly 85% of pendency resides.

A recurring source of pendency lies in the failure of parties to ensure service of summons and timely production of evidence. In both civil and criminal cases, the responsibility for moving a case forward rests with the parties. The court issues process; its effectiveness depends on how it is pursued. In civil cases, delay often begins at admission. Addresses change, particularly where multiple defendants are involved, and service becomes prolonged. Follow-up is weak, steps are delayed, and process is repeatedly reissued. Years may pass before the matter reaches trial. The same pattern persists during trial, where delay is often achieved within the framework of procedure itself. Courts, reluctant to deny access at admission or terminate proceedings mid-trial, allow time. What is intended as fairness is later read as delay. Prolongation by parties, though procedurally compliant, ultimately reflects as pendency of the court.

        `The recent proceedings before the Supreme Court of India, seeking the Union's response to a challenge against aspects of Muslim inheritance law as discriminatory to women, have predictably reignited the call for a Uniform Civil Code (UCC). The instinct is familiar: when confronted with inequity within a system, replace the system altogether. When the Court expressed a poignant concern: that merely striking down the 1937 Act might create a "legal vacuum," leaving Muslim women without the protection of any statutory law, the response was that the Indian Succession Act (ISA) could be made applicable as though the law is perfect. This reflex for UCC risks confusing uniformity with justice; pitching for ISA as an ideal replacement buries under carpet several serious deficits in the existing legislation that is yet to adopt several salutary amendments suggested in 247th report of Law Commission recommendations for alteration of the scheme of inheritance and class of heirs in several situations. The present moment instead demands a more difficult, but ultimately more durable, path- systematic internal reform of personal laws across communities.

        `An application for interim custody. Another for visitation. Another for weekend access. Another for holidays. Another for a birthday. Another for a video call. Another for telephone contact. Another for permission to take the child out. Another for school attendance. Another for medical consultation. Then a request to alter the timing. Then a plea to change the venue. Then a complaint of breach. Then contempt, because a call between six and seven in the evening did not happen. Then the explanations begin: no internet, the child was unwilling, the parent was delayed, the order was misunderstood, the venue became inconvenient. A fresh order follows. Then another application. Then another clarification.

        `The Supreme Court (the SC) in Chinthada Anand v. State of Andhra Pradesh reiterated the legal position that conversion to religions other than Hinduism, Jainism, or Sikhism results in the loss of Scheduled Caste status. The petitioner had challenged an order of the Andhra Pradesh High Court quashing the FIR against the respondents. The respondents had allegedly beaten and hurled casteist slurs against the petitioner, a member of the Hindu-Madiga community (categorised as Scheduled Caste). The petitioner had, however, converted to Christianity. The HC, inter alia, held that offences registered under the Scheduled Castes and Scheduled Tribes (Prevention of Atrocities) Act, 1989, (the SC/ST Act) could not have been made out, since the victim was not a member of the Scheduled Castes following their conversion. The SC upheld this view.

        `Waiting for the next date can be anxiety-inducing. I don't mean that romantically. I'm referring to what most litigants face as their cases wind through the Indian justice system. Two questions that counsel routinely receive from clients are 'what happened in my case' and 'when is the next court hearing date'. The answer to the second question - the hearing date - is more complex than meets the eye.

        `In a landmark decision that will be remembered as a moment of constitutional reassertion, the Supreme Court of the United States (SCOTUS/the Court) has declined to read the words 'regulate importation' under Section 1702(a)(1)(B) of the International Emergency Economic Powers Act (IEEPA) as a charter for unbridled presidential authority to impose tariffs. In doing so, the Court set aside one of the most consequential assertions of unbounded executive authority by US President Donald Trump.

        `The Constitution of India vests the High Courts with a special writ jurisdiction under Article 226 to ensure the delivery of complete justice. Initially, the scope of Article 226 was confined to the "territories in relation to which it exercises jurisdiction." However, this created a serious problem by restricting writ jurisdiction in Union matters solely to the Punjab High Court (before formation of Delhi High Court) as the seat of Government of India was located in New Delhi, thereby causing inconvenience for litigants across India. In effect, the earlier provision limited the writ jurisdiction of other High Courts in such cases. To address this limitation, the 15th Constitutional Amendment significantly expanded the scope by introducing Clause (1A), empowering High Courts to issue directions, orders, or writs even in cases where the "cause of action", wholly or in part, arises within their territorial jurisdiction, irrespective of whether the authority or person concerned is located within those territories. Today, Article 226(2) governs this aspect, enabling High Courts to exercise jurisdiction beyond their territorial limits when the cause of action arises, wholly or in part, within their jurisdiction.

        `Every person has a right to practice their own religion as per Article 25 of the Indian Constitution, state can only interfere when it affects public order, morality or health. State should have no objection if a person is practicing his religion within his domestic household. The present case "Badri Prasad Sahu & Anr. v. State of Chhattisgarh" 2026:CGHC:13995 as decided by the Chhattisgarh High Court on 1st April 2026 held that individuals do not require prior state permission to conduct prayers within their domestic households provided that such an act do not interferes with the exceptions mentioned under Article 25 of Indian Constitution. The present case clarifies the ambiguity that no administrative action can prevent a person from practicing his fundamental right and that too within their habitable space. Authorities often use restrictive practices and intervene in the religious affairs in the guise of preventing a bigger harm, even when there is no such harm to public policy, morality or health. What makes this judgment important is how the Chhattisgarh High Court cancelled the police notice issued under Section 94 of the Bharatiya Nagarik Suraksha Sanhita, 2023 and held that authorities can't interfere with the religious affairs until there is a valid legal reason behind it.

        `Wars are often narrated as discrete events, bounded by geography and driven by immediate triggers. The ongoing conflict involving the United States, Israel and Iran resists such containment. What appears as a regional escalation is, in reality, a systemic disturbance, one that is simultaneously testing legal norms, economic structures and geopolitical alignments. Recent developments only reinforce this character: the conflict has expanded across multiple theatres, drawn in non-state actors and disrupted critical global supply chains. Its effects are no longer regionally contained; they are structurally global. In simple terms, this is no longer a conflict that can be neatly confined to one region. At one level, the conflict reflects familiar patterns of deterrence and retaliation. At another, it reveals a deeper shift: the collapse of functional separation between economic policy and strategic coercion. Trade, energy and law no longer operate as neutral systems; they are increasingly used as tools through which power is exercised, compliance is extracted, and dissent is disciplined. In this environment, the central question is not who prevails in a particular theatre, but whether the structures governing global interaction retain any independent normative force. At its core, this conflict also raises a foundational legal question: can the use of force be assessed selectively without eroding the coherence of international law itself?

        `The Securities and Exchange Board of India (SEBI) is the market regulator focused on protecting investor interests. However, its role in settling disputes between investors and companies is still debated. While SEBI regulates and enforces rules, it does not have a solid system for providing remedies that focus on investors. Since the Securities and Exchange Board of India Act was introduced in 1992, SEBI has slowly expanded its power over intermediaries and listed companies. However, it has not developed adequate remedies for individual investors. The main issue lies in the conflict between SEBI's duty to maintain market integrity and the private nature of investor-company disputes. These disputes usually involve concerns like manipulative selling, failures in disclosure, or governance issues. Such matters often impact specific investors rather than the entire market. SEBI's enforcement powers, recognized by the Supreme Court, have not been effectively transformed into systems for ensuring compensation for investors who have incurred losses. SEBI gets its authority from the Securities and Exchange Board of India Act, 1992. Section 11 focuses on investor protection, but the Act does not establish a direct way for investors to seek compensation. This limitation shapes how SEBI operates. More specifically, the design focuses on regulatory oversight, investigations, and enforcement actions, like issuing orders to intermediaries, imposing market bans, and applying fines. It does not provide a private way for investors to claim damages directly through SEBI. While Section 11 broadly aims to protect investors and promote the securities market, the specific powers granted to SEBI mainly allow it to act in the public interest and deter misconduct across the market.

        `On March 25, Parliament passed the Transgender Persons (Protection of Rights) Amendment Bill, 2026 ("Bill"). Despite strong objections from the opposition, including a motion by DMK MP Tiruchi Siva to refer the Bill to a Select Committee, the Rajya Sabha nevertheless approved the Bill that very day. A decade ago, the Supreme Court in NALSA v. Union of India (2014), affirmed a simple but transformative principle: gender identity belongs to the individual, and the State cannot condition its recognition on medical procedures. The present Bill places that principle under strain. It does not openly reject NALSA, but it redraws the legal framework in ways that render self-identification practically irrelevant.

Instead, the Bill confines recognition to a limited set of socio-cultural categories such as kinnar, hijra, aravani, and jogta, along with persons with medically recognised intersex variations and individuals who were compelled to adopt a transgender identity through coercion or surgery. This redefinition produces far-reaching consequences. It entirely excludes trans masculine persons from the legal framework and leaves trans women who do not identify with the specified communities without a clear path to recognition. Non-binary, genderqueer, and genderfluid individuals find themselves outside the scope of the law altogether. Moreover, the Bill overlooks several region-specific identities, including Thirunangai, Thirunambi, and Thirunar from Tamil Nadu, Nupi Maanbi from Manipur, and Kothi and Mangal Mukhi communities. By privileging categories that largely derive from Hindi and Sanskrit traditions, the law risks imposing a culturally narrow framework that erases the diversity of transgender identities across India.

        `The Supreme Court, recently in the case of Chinthada Anand v. State of Andhra Pradesh (March 2026), has decided a complex and constitutional question of who is entitled to be recognised as a Scheduled Caste. This question arose while deciding a criminal proceeding under the Scheduled Castes and Scheduled Tribes (Prevention of Atrocities) Act, 1989. In this case, the complainant was a pastor, and he was born into a Scheduled Caste family and later converted to Christianity. The proceeding under the SC/ST Act was quashed by the High Court of Andhra Pradesh, holding that, under the constitutional framework governing the Scheduled Castes, this Act could not be invoked by those who have ceased to profess the religion mentioned in the Constitution (Scheduled Castes) Order 1950. When the matter reached the Supreme Court, the court not only decided the applicability of the SC/ST Act, but also dealt with the deeper question of what the constitutional identity of the scheduled castes is. The Supreme Court upheld the view of the High Court of Andhra Pradesh, reaffirming the strict rule of interpretation. The status of the Scheduled Caste does not depend only upon birth but has a condition under the constitutional framework upon religious conversion.

        `It is always in jest or laughter that references are made to the 1st of April - April Fools' Day - a day when practical jokes are customarily a part of life. For the banker, it is the beginning of the new financial year. For the history buff, it is the day on which Adolf Hitler was sentenced to five years imprisonment for his participation in the Beer Hall Putsch. The day, however, commemorates the birth anniversary of two legends of the law who walked the corridors of the Court - both of whom served as Advocate General of their respective States, Solicitor General of India and finally Attorney General for India. In style, they were starkly different. I speak of C.K. Daphtary (born on 1st April 1893) and Lal Narayan Sinha (born on 1st April 1907).

        `C.K. Daphtary is a jewel of the legal profession in India. He occupied the high offices of Solicitor General and Attorney General and by his superior powers of advocacy and the warmth of his personality carved for himself a unique niche amongst the immortals in the world of law. It is appropriate to remember him and salute his memory on his birth anniversary. Chander Kishan Daphtary affectionately called C.K or Chandubhai was born on 1st April, 1893. It was Hanuman Jayanti according to the Hindu calendar. At a very young age he went to England and was under the care of an uncle. He had his education at St. Paul's and then at Magdalene College, Cambridge where he read Classics and graduated with a first class. He was called to the Bar from Lincoln's Inn in January 1917. Returning to India he joined the chambers of J.D. Inverarity, the doyen of the Bombay Bar and one of the greatest lawyers ever. Thus began a legal career bright and glittering as any and equally charming.

        `Consensus fact legem, which means consent makes the law. Primacy of consent is not only confined to the formation of contracts but also underpins a wide array of legal relationships and highlights a philosophical commitment to individual autonomy. Our Constitution begins with the Preamble, where we promise to each other OUR collective consent, across generations, as "WE, THE PEOPLE OF INDIA, having solemnly resolved ...do HEREBY ADOPT, ENACT AND GIVE TO OURSELVES THIS CONSTITUTION." Elements of consent and free will were introduced by the British in the Indian Penal Code of 1860, the Indian Contract Act of 1872, and other codified property and personal laws. Courts, over the years, have interpreted consent and shaped the jurisprudence. The Madras High Court in Chikkam Ammiraju and Others v. Chikkam Seshamma and Anr., AIR 1918 Mad 414, held that a threat amounts to coercion and makes the agreement voidable. The Supreme Court of India in Central Inland Water Transport Corporation Ltd. & Anr. v. Brojo Nath Ganguly & Anr., AIR 1986 SC 1571, highlighted the importance of fairness and autonomy in consent and declared the unconscionable part in the contract as void as it undermined the free will of the weaker party. In a criminal matter, the Supreme Court in State of Maharashtra v. Madhukar Narayan Mardikar, AIR 1991 SC 207, asserted that every individual, including sex workers, has the right to bodily autonomy and the ability to withhold consent and thereby reinforced that consent must be explicit and free from coercion.

The Supreme Court in Justice K.S. Puttaswamy (Retd.) v. Union of India, 2017 INSC 801 ["Puttaswamy Case"], recognized privacy as a fundamental right protected under Articles 14, 19, and 21 of the Indian Constitution and emphasized informed consent in matters of privacy rights, holding that individuals must fully understand the implications of sharing personal data. After multiple drafts and iterations, the Digital Personal Data Protection ("PDPP") Act, 2023, was enacted on August 11, 2023, and the government thereafter notified the DPDP Rules, 2025, on November 14, 2025, activating a phased implementation framework. The principle of consent has become central in India's privacy and data protection law, and the very structure of the DPDP Act reflects the maxim consensus fact legem: a data principal's consent is the primary lawful basis for collecting or using their personal data. The DPDP Act requires that consent be free, specific, informed, unconditional, and unambiguous, given via a clear affirmative action.`,

        `Kuttiyil Kurien Mathew is one who is highly regarded for his erudition and seminal contribution to Constitutional and Administrative Law. Prof Upendra Baxi perceptively observed, "We live in an era of massacre of ancestors which is considered a public virtue and a sign of worldly progress. But collective amnesia of what happened in the past is not an estimable virtue. Without living in the past its recall is important, for, it necessarily presages a future." It is in this backdrop that we have to recall people like Justice Mathew. Persons like him are, and should be, role models. We remember him to enrich ourselves.

        `While there is no real dispute over the power of a testamentary court to appoint an administrator pendente lite, recourse is often taken to Order XXXIX Rule 1 and 2 in testamentary proceedings when orders for interlocutory injunction are required to be passed, in order to preserve the subject matter of the testament in dispute. However, there is considerable conflict in opinion across High Courts over the competence of the 'testamentary court' to pass interlocutory injunctive reliefs in exercise of powers under Order XXXIX Rule 1 and 2 of the CPC; or in exercise of inherent powers under Section 151 of the CPC. As far back as 1951, a division bench of the Calcutta High Court was called upon to decide the powers and jurisdiction of a testamentary court to protect the properties which are the subject matter of testamentary disposition. After considering Section 247 and Section 269 (1) of the ISA r/w Order XXXIX Rule 1 and 2 of the CPC, the Court ruled that '..the court of probate is not thereby wholly incompetent to grant a temporary injunction even in extreme cases; such order of injunction is to be issued only in aid of & in furtherance of the purpose for which a grant is made by a probate court. It is, therefore, open to the probate court not only to appoint an administrator pendente lite, but also to issue an order of injunction, temporary in character, pending the appointment of an administrator pendente lite. If such powers are exercised in probate cases by a probate court, there is no reasonable chance of an property being dissipated, pending the actual grant of a probate or the appointment of an administrator'. The aforesaid view stands echoed in subsequent rulings of the Delhi High Court, as well as the Calcutta High Court, which reiterated that a testamentary court was competent to pass an order of injunction in an appropriate case, in order to preserve the subject properties. However, discordant note against the aforesaid proposition was authoritatively struck by a division bench of the Bombay High Court in 2011. After examining existing pronouncements on the issue, it was observed that 'It would not be permissible, in the face of the specific provision of sub-section (2) of Section 269 to read into the provisions of Sections 266 and 268 a general power to grant interlocutory relief even prior to the grant of probate in respect of the property which is alleged to form part of the estate of the deceased.`,

        `This is not a dialogue but harsh reality of our Indian legal system which fails to change itself as per the evolving society. The Protection of Children from Sexual Offences Act, 2012 (POCSO) was enacted with a positive intent to address a serious and pervasive problem: sexual abuse of children in India. The law adopts a strict, child-centric framework by criminalising all sexual activity involving persons below the age of 18, irrespective of consent. While this approach was intended to ensure maximum protection, empirical data, judicial observations, and ground-level implementation reveal that the law, in its present form, also produces outcomes that were never intended by the legislature.

        `The Republic of India, as articulated in Article 1 of its Constitution, is a "Union of States." The territorial integrity of these constituent states, however, is not immutable. The Constitution of India confers upon the Parliament the power to reorganise the states, including the authority to alter their names. This power is a significant feature of India's quasi-federal structure, often described as an "indestructible union of destructible states." In re: Berubari Union Judgment (1960), the Supreme Court of India has clarified that Article 3 gives Parliament the power to "destruct" the identity of a state. This reinforces the idea that India is an indestructible Union of destructible States.

        `The Kuldeep Singh Sengar case exposed the deep structural ambiguities in India's child protection jurisprudence. Contrary to the popular perception, the controversy was not primarily rooted in the disputed facts, but in a doctrinal mismatch between nineteenth-century statutory definitions and twenty first century demands of child centric criminal justice. This article examines the interpretative conflict arising from the Protection of children from sexual offences (POCSO) Act, 2012, specifically its aggravated-offence framework. By relying on the "public servant" definition in the section 21 of the Indian Penal Code, 1860 which is a colonial provision arguably excludes elected representatives which inadvertency creates the vacuum in the law. This article argues for a legislative reform to ensure that the political power does not grant the immunity from the aggravated liability.

        `ESG has become a quasi-regulatory parameter in the merger control phenomenon. The Competition authorities now need to assess not only traditional price and market-structure effects but also sustainability outcomes. This approach represents a contemporary shift in corporate and commercial regulation. The bone of contention is: If ESG now shapes merger outcomes in the same manner as competition law, can such regulatory power be exercised without the procedural safeguards and legal certainty that traditionally legitimise antitrust enforcement?

        `The three-point framework issued by the scholarly Justice Robert Jackson of the Supreme Court of the United States, in the case of Youngstown Sheet & Tube Co. Ltd. v. Sawyer, popularly known as the Steel Mills Seizure case (1952), resonates today with renewed relevance, as we pore over the pages of the judgment delivered on February, 20 2026, in Learning Resources, Inc., v. Trump, President of the United States, where the Supreme Court of the United States struck down the tariff orders of President Trump on imports.

        `On January 20, 2009, Barack Obama stood on the steps of the United States Capitol and prepared to take the oath of office as President. The words he was about to speak were not ceremonial fluff. They were set out verbatim in Article II of the US Constitution. Every syllable mattered. Chief Justice John Roberts began administering the oath. In the glare of cameras and before a sea of expectant faces, he misplaced a word. Instead of asking the President-elect to say he would "faithfully execute the Office of President of the United States," Roberts shifted the position of "faithfully." Obama paused. There was a brief exchange. The sentence was completed, but not in the precise order the Constitution prescribed. No one doubted who had won the election. No one seriously believed that the Republic would collapse over a transposed adverb. Yet the next day, inside the White House, the oath was administered again. Quietly. Carefully. Word perfect.

        `Now that this new government has been in power for more than three months, the official talk of "simplification" and "flexibility" has given way to a stark reality of procedural uncertainty for the growing number of salaried professionals. People who work in these salaried jobs are usually described as having jobs that need a lot of knowledge, are not manual, and are administrative or clerical, and they usually do their work in an office. These workers are now in a "contractual sovereignty" zone since the new Codes have taken away the legal protections that used to be available to the conventional "workman." Instead, they are stuck with the strict rules of private contracts and the slow pace of civil court cases.

        `The National Law Universities were born from a promise when NLSIU Bangalore opened in 1987 to produce constitutional warriors and democratize legal education, but four decades later today's NLUs function primarily as a training grounds for corporate law firms where the best minds serve the top one percent while the bottom 99 percent navigate a justice system systematically starved of talent in what amounts to structural betrayal by design.

        `Recently, the Hon'ble Supreme Court of India ("SC"), in Dr. Jaya Thakur v. Union of India ("Jaya Thakur"), observed that the right to life under Article 21 of the Constitution encompasses the right to menstrual health. The Court emphasized that the absence of effective menstrual hygiene measures in educational institutions not only impairs access to education under Article 21-A but also infringes the rights to equality, dignity, and personal liberty. By recognizing menstrual health as constitutionally significant, the Court situates a menstrual health within the broader framework of fundamental rights.

The decision of the Supreme Court of India reaffirms the opening declaration of the Constitution "We, the People". This declaration reflects that the Constitution and its underlying principles are sustained through participation, inclusion, and equal access to opportunities. Furthermore, Article 14 makes it clear that equality is not confined merely to the recognition of individual dignity; it extends to the assurance of equal opportunity for every individual to realise their human potential and pursue their social, economic, and legal interests.

A study conducted under the Keep Girls in School initiative, reflected in the National Survey and Gap Analysis Report ("Report"), highlights the severity of the issue. The Report notes that 1 (one) out of 5 (five) girls in India drops out of school due to the lack of menstrual education and access to sanitary products. It further observes that 'period education has been missing from schools, families, and communities,' resulting in 71% (seventy one percent) of girls being unaware of menstruation when they first experience it. Also Read - Reconciling Advocate's Dual Duties To Client And Court In Indian Legal Ethics What these figures often fail to capture is the cumulative impact. Missing two or three days of school each month translates into several weeks of lost instruction over the course of a year. For students already navigating overcrowded classrooms, limited teacher attention, and household responsibilities, the margin for falling behind is minimal. Over time, these learning gaps widen, participation declines, and disengagement gradually sets in.

        `Globalisation has reshaped the contemporary world into a densely interconnected economic and cultural sphere, enabling unprecedented circulation of goods, ideas, and populations. Its economic promises are frequently celebrated in narratives of growth and opportunity; yet its cultural consequences — particularly within post-colonial societies — demand more searching scrutiny. The very mechanisms that facilitate global integration have also accelerated processes of cultural homogenisation, commodification, and asymmetrical power relations in the preservation and restitution of heritage.

Culture, in its deepest sense, is not reducible to a tradable commodity nor to aesthetic spectacle. It is a lived continuum sustained by language, memory, ritual, and collective identity. However, globalisation — propelled by market rationality and global media ecosystems — increasingly reframes cultural expression as consumable output. Indigenous art forms, music, ritual practices, and traditional knowledge systems are often repackaged to satisfy global demand, frequently severed from their social and historical moorings. Such commodification risks hollowing cultural meaning while marginalising the communities that remain custodians of these traditions. India's vast linguistic and cultural plurality illustrates this tension with particular clarity. With hundreds of languages and dialects, the Indian civilisational fabric is grounded in pluralism. Yet the institutional and economic ascendancy of English as a global lingua franca has contributed to the erosion of indigenous linguistic ecosystems. Tribal and regional languages — repositories of ecological knowledge, oral histories, and community epistemologies — increasingly confront extinction. This attrition represents not merely linguistic evolution, but a substantive cultural impoverishment that diminishes humanity's intellectual diversity.

Traditional crafts and artisanal industries reveal a similar pattern of displacement. Handloom weaving, folk painting, wood carving, and natural dyeing — once embedded within intergenerational systems of knowledge transmission — struggle to survive within a marketplace dominated by mass production and efficiency metrics. As artisans migrate toward economically viable livelihoods, practices rooted in accumulated expertise gradually recede. The decline of such crafts is therefore not solely an economic phenomenon; it reflects a systemic undervaluation of cultural labour within global market structures.

        `The Supreme Court's landmark ruling for Paramvir Singh Saini v. Baljit Singh was supposed to be a watershed moment for human rights in India. It mandated that every police station be equipped with night-vision CCTV cameras, recording both audio and video, with a non-negotiable requirement to preserve footage for a minimum of one year, and ideally eighteen months. These weren't mere administrative suggestions; they were constitutional imperatives issued under Article 21 to ensure that transparency becomes the bedrock of human dignity in custodial spaces. However, responses to my RTI applications across Uttar Pradesh reveals a disturbing silence of these mandates.

        `India's labour market is often characterised as 'informal', with over 93% of workers located outside the organised sector in what is known as the 'informal economy'. Notably though, the divide between formal and informal workers emerges as a product of legal architecture rather than a category based on the degree of vulnerability of the workers or their nature of work. Formal or 'organized sector' labour, legally, refers to work performed in registered establishments, where workers draw regular wages or salaries, have enforceable workplace rights, with access to the state's social security system. However, the fact is that, even within these 'formal' establishments, large sections of the workforce remain contractual, casualised, and excluded from core legal protections.
